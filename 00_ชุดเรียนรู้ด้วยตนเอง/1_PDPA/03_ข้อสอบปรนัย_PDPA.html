<!DOCTYPE html>

<title>❓ ข้อสอบปรนัยจำลอง PDPA (20 ข้อ)</title>
<style>
  :root{--bg:#0f172a;--paper:#111c33;--txt:#e6edf6;--muted:#9fb0c7;--accent:#38bdf8;--line:#2b3a52;--hl:#fcd34d}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:"Sarabun","Segoe UI",Tahoma,sans-serif;line-height:1.75}
  .topnav{position:sticky;top:0;background:#0b1322ee;backdrop-filter:blur(6px);border-bottom:1px solid var(--line);
          padding:10px 16px;display:flex;gap:14px;align-items:center;z-index:50;font-size:14px}
  .topnav a{color:var(--muted);text-decoration:none;padding:5px 11px;border:1px solid var(--line);border-radius:999px}
  .topnav a:hover{color:var(--accent);border-color:var(--accent)}
  main{max-width:860px;margin:0 auto;padding:30px 22px 80px}
  h1,h2,h3,h4{line-height:1.35;margin:1.5em 0 .6em;font-weight:700}
  h1{font-size:27px;border-bottom:2px solid var(--accent);padding-bottom:.3em;margin-top:.3em}
  h2{font-size:22px;color:#bfe6fb;border-bottom:1px solid var(--line);padding-bottom:.25em}
  h3{font-size:18px;color:#a7d8f0}
  h4{font-size:16px;color:var(--muted)}

       font-family:"Cascadia Code",Consolas,monospace}
  pre{background:#0b1322;border:1px solid var(--line);border-radius:10px;padding:14px 16px;overflow:auto}
  pre code{border:none;padding:0;background:none}
  a{color:var(--accent)}
  ul,ol{margin:.5em 0 .9em;padding-left:1.6em}
  li{margin:.3em 0}
  ul ul,ol ol,ul ol,ol ul{margin:.2em 0}
  blockquote{margin:1em 0;padding:.6em 1em;border-left:4px solid var(--accent);background:#0b132288;border-radius:0 8px 8px 0;color:#cdd9e8}
  blockquote p{margin:.3em 0}

  th,td{border:1px solid var(--line);padding:9px 12px;text-align:left;vertical-align:top}

  summary{cursor:pointer;color:var(--accent);font-weight:600}
  ::selection{background:#38bdf855}
</style>

<body>
  <div class="topnav">
    <a href="หน้าแรก.html">🏠 หน้าแรก</a>
    <a href="javascript:scrollTo(0,0)">↑ บนสุด</a>
    <a href="javascript:window.print()">🖨️ พิมพ์/บันทึก PDF</a>
  </div>
  <main id="content"></main>

<script>
const MD = "# ❓ ข้อสอบปรนัยจำลอง PDPA (20 ข้อ)\n### วิธีใช้: ทำให้ครบก่อน อย่าเพิ่งดูเฉลย → เฉลยอยู่ท้ายไฟล์ พร้อมคำอธิบาย\n\n---\n\n**1.** PDPA มีผลบังคับใช้เต็มรูปแบบเมื่อใด\nก. 27 พ.ค. 2562  ข. 1 ม.ค. 2563  ค. 1 มิ.ย. 2565  ง. 1 ม.ค. 2565\n\n**2.** ข้อใดเป็น \"ข้อมูลส่วนบุคคล\" ตามมาตรา 6\nก. ข้อมูลของบริษัทจำกัด  ข. เลขบัตรประชาชนของผู้เสียชีวิต  ค. หมายเลขโทรศัพท์ของนายสมชาย  ง. ยอดขายรวมของบริษัท\n\n**3.** ผู้ที่มีอำนาจ \"ตัดสินใจ\" เกี่ยวกับการเก็บ/ใช้/เปิดเผยข้อมูล เรียกว่าอะไร\nก. Data Processor  ข. Data Controller  ค. Data Subject  ง. DPO\n\n**4.** PDPA มีฐานการประมวลผลข้อมูลทั่วไปทั้งหมดกี่ฐาน\nก. 5  ข. 6  ค. 7  ง. 8\n\n**5.** การติดตั้งกล้องวงจรปิด (CCTV) เพื่อความปลอดภัยของอาคาร อาศัยฐานใด\nก. ความยินยอม  ข. สัญญา  ค. ประโยชน์โดยชอบด้วยกฎหมาย  ง. ภารกิจรัฐ\n\n**6.** ข้อใด **ไม่ใช่** ข้อมูลส่วนบุคคลอ่อนไหว (Sensitive Data) ตามมาตรา 26\nก. ข้อมูลสุขภาพ  ข. ความคิดเห็นทางการเมือง  ค. เลขที่บัญชีธนาคาร  ง. ข้อมูลพันธุกรรม\n\n**7.** ผู้ควบคุมข้อมูลต้องแจ้งเหตุการละเมิดข้อมูลส่วนบุคคลต่อสำนักงานฯ ภายในกี่ชั่วโมง\nก. 24 ชม.  ข. 48 ชม.  ค. 72 ชม.  ง. 7 วัน\n\n**8.** สิทธิ \"ขอให้ลบหรือทำลายข้อมูล\" (Right to be forgotten) อยู่ในมาตราใด\nก. ม.30  ข. ม.32  ค. ม.33  ง. ม.36\n\n**9.** มาตรการรักษาความมั่นคงปลอดภัยของข้อมูลต้องครอบคลุม 3 ด้าน ตรงกับข้อใด\nก. Confidentiality, Integrity, Availability\nข. Consent, Integrity, Accountability\nค. Confidentiality, Identity, Access\nง. Control, Integrity, Authorization\n\n**10.** ข้อใดถูกต้องเกี่ยวกับความยินยอม (Consent)\nก. เมื่อให้แล้วถอนไม่ได้  ข. ถอนเมื่อใดก็ได้  ค. ต้องขอหลังเก็บข้อมูลเท่านั้น  ง. ไม่จำเป็นต้องแยกส่วนจากข้อความอื่น\n\n**11.** ข้อใด **ไม่** อยู่ภายใต้บังคับ PDPA (ข้อยกเว้น ม.4)\nก. ร้านค้าออนไลน์เก็บข้อมูลลูกค้า  ข. การเก็บภาพครอบครัวไว้ดูเอง  ค. โรงพยาบาลเก็บประวัติคนไข้  ง. บริษัทเก็บข้อมูลพนักงาน\n\n**12.** หน่วยงานกำกับดูแลตาม PDPA คือข้อใด\nก. กสทช.  ข. สคส. (PDPC)  ค. ETDA  ง. สกมช.\n\n**13.** ข้อมูลที่ผ่านกระบวนการทำให้ระบุตัวบุคคลไม่ได้อย่างถาวร เรียกว่า\nก. Pseudonymization  ข. Encryption  ค. Anonymization  ง. Tokenization\n\n**14.** การโอนข้อมูลส่วนบุคคลไปต่างประเทศ (ม.28) มีหลักการสำคัญคือ\nก. ห้ามโอนทุกกรณี  ข. ประเทศปลายทางต้องมีมาตรฐานคุ้มครองที่เพียงพอ  ค. โอนได้เสรีหากเป็นบริษัทในเครือ  ง. ต้องขออนุญาตศาล\n\n**15.** ROPA (มาตรา 39) หมายถึงอะไร\nก. นโยบายความเป็นส่วนตัว  ข. บันทึกรายการกิจกรรมการประมวลผล  ค. คำขอความยินยอม  ง. รายงานการละเมิดข้อมูล\n\n**16.** โทษทางปกครองสูงสุดตาม PDPA คือเท่าใด\nก. 1 ล้านบาท  ข. 3 ล้านบาท  ค. 5 ล้านบาท  ง. 10 ล้านบาท\n\n**17.** ข้อใดคือ \"เหตุผลเชิงจริยธรรม\" ของหลักจำกัดวัตถุประสงค์ (Purpose Limitation)\nก. ลดต้นทุนการจัดเก็บ  ข. ความไว้วางใจที่ได้รับต้องไม่ถูกนำไปใช้ผิดวัตถุประสงค์  ค. เพิ่มยอดขาย  ง. ทำให้ระบบเร็วขึ้น\n\n**18.** ผู้ประมวลผลข้อมูล (DP) เมื่อพบเหตุละเมิดข้อมูล ต้องแจ้งต่อใคร\nก. สคส. โดยตรง  ข. ผู้ควบคุมข้อมูล (DC)  ค. เจ้าของข้อมูล  ง. ตำรวจ\n\n**19.** ข้อมูลส่วนบุคคลอ่อนไหวตาม ม.26 โดยหลักต้องใช้ฐานใด\nก. ความยินยอมทั่วไป  ข. ความยินยอมโดยชัดแจ้ง  ค. ฐานสัญญา  ง. ไม่ต้องมีฐาน\n\n**20.** เป้าหมายสูงสุดเชิงจริยธรรมของ PDPA คือข้อใด\nก. เพิ่มรายได้รัฐจากค่าปรับ  ข. สร้างความไว้วางใจ (Trust) ในสังคมดิจิทัล  ค. จำกัดการใช้อินเทอร์เน็ต  ง. ควบคุมสื่อมวลชน\n\n---\n---\n\n## ✅ เฉลย + คำอธิบาย\n\n| ข้อ | ตอบ | คำอธิบาย |\n|---|---|---|\n| 1 | **ค** | บังคับใช้เต็มรูปแบบ 1 มิ.ย. 2565 (ประกาศ 2562 แต่เลื่อนบังคับหมวดหลัก) |\n| 2 | **ค** | ม.6 = ระบุตัวบุคคลธรรมดาได้; บริษัท/คนตาย/ข้อมูลรวม ไม่ใช่ |\n| 3 | **ข** | Data Controller = ผู้ตัดสินใจ; Processor = ทำตามคำสั่ง |\n| 4 | **ค** | 7 ฐาน = Consent (ม.19) + 6 ข้อยกเว้น (ม.24) |\n| 5 | **ค** | CCTV = ฐานประโยชน์โดยชอบด้วยกฎหมาย ม.24(5) |\n| 6 | **ค** | เลขบัญชีธนาคารเป็นข้อมูลส่วนบุคคล**ทั่วไป** ไม่ใช่ Sensitive |\n| 7 | **ค** | 72 ชม. นับแต่ทราบ (ม.37(4)) |\n| 8 | **ค** | ม.33 = Right to Erasure |\n| 9 | **ก** | CIA Triad |\n| 10 | **ข** | ถอนความยินยอมเมื่อใดก็ได้ (ม.19 ว.5); ต้องขอก่อน/ขณะเก็บ และแยกส่วนชัดเจน |\n| 11 | **ข** | ม.4(1) ใช้เพื่อประโยชน์ส่วนตน/ครอบครัว ได้รับยกเว้น |\n| 12 | **ข** | สคส./PDPC (กสทช.=คลื่นความถี่, ETDA=ธุรกรรมอิเล็กฯ, สกมช.=ไซเบอร์) |\n| 13 | **ค** | Anonymization (ถาวร, พ้นจากเป็นข้อมูลส่วนบุคคล) |\n| 14 | **ข** | ม.28 — มาตรฐานคุ้มครองเพียงพอ (มีข้อยกเว้นเช่นความยินยอม) |\n| 15 | **ข** | Record of Processing Activities (ม.39) |\n| 16 | **ค** | ปกครองสูงสุด 5 ล้านบาท (อาญาสูงสุด 1 ล้าน + จำคุก 1 ปี) |\n| 17 | **ข** | จริยธรรม = รักษาความไว้วางใจ ไม่ใช้ข้อมูลผิดวัตถุประสงค์ |\n| 18 | **ข** | DP แจ้งต่อ DC (ม.40); DC ต่างหากที่แจ้ง สคส. |\n| 19 | **ข** | Sensitive Data ต้องขอ Explicit Consent เว้นแต่ข้อยกเว้น ม.26(1)-(5) |\n| 20 | **ข** | Trust — ถ้าไม่เชื่อมั่น เศรษฐกิจดิจิทัลโตไม่ได้ |\n\n**เกณฑ์ประเมินตนเอง:** 18–20 = แม่นมาก · 14–17 = ดี ทบทวนข้อที่ผิด · ต่ำกว่า 14 = อ่านสรุปเนื้อหาอีกรอบแล้วทำใหม่\n";
const C0 = String.fromCharCode(1), C1 = String.fromCharCode(2);  // ตัวคั่นชั่วคราวสำหรับ inline code

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// จัดรูปแบบ inline: code, ลิงก์, ตัวหนา, ตัวเอียง  (rawHtml=true จะไม่ escape < >)
function inline(t, rawHtml){
  let s = rawHtml ? t : esc(t);
  const codes = [];
  s = s.replace(/`([^`]+)`/g, function(m,c){ codes.push(c); return C0+(codes.length-1)+C1; });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(new RegExp(C0+'(\\d+)'+C1,'g'), function(m,i){ return '<code>'+codes[i]+'</code>'; });
  return s;
}

function isTableSep(l){ return /^\s*\|?[\s:|-]+\|?\s*$/.test(l) && l.indexOf('-')>=0; }
function splitRow(l){
  let s = l.trim().replace(/^\|/,'').replace(/\|$/,'');
  return s.split('|').map(function(c){ return c.trim(); });
}

function render(md){
  const lines = md.replace(/\r\n?/g,'\n').split('\n');
  let html = '', i = 0, para = [];
  const flush = function(){ if(para.length){ html += '<p>'+para.map(function(x){return inline(x);}).join('<br>')+'</p>'; para=[]; } };

  while(i < lines.length){
    let l = lines[i];

    if(l.trim()===''){ flush(); i++; continue; }

    // โค้ดบล็อก
    if(/^`/.test(l.trim())){ flush(); let buf=[]; i++;
      while(i<lines.length && !/^`/.test(lines[i].trim())){ buf.push(lines[i]); i++; }
      i++; html += '<pre><code>'+esc(buf.join('\n'))+'</code></pre>'; continue; }

    // หัวข้อ
    let h = l.match(/^(#{1,6})\s+(.*)$/);
    if(h){ flush(); const n=h[1].length; html += '<h'+n+'>'+inline(h[2])+'</h'+n+'>'; i++; continue; }

    // เส้นคั่น (--- หรือ *** หรือ ___) บรรทัดที่มีแต่อักขระเหล่านี้
    if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(l)){ flush(); html+='<hr>'; i++; continue; }

    // ตาราง
    if(l.trim().indexOf('|')===0 && i+1<lines.length && isTableSep(lines[i+1])){
      flush();
      const head = splitRow(l); i += 2;
      let rows = [];
      while(i<lines.length && lines[i].trim().indexOf('|')===0){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+head.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>'; }
      html += t+'</tbody></table>'; continue;
    }

    // blockquote
    if(/^\s*>/.test(l)){ flush(); let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      html += '<blockquote>'+buf.map(function(x){return x.trim()===''?'':'<p>'+inline(x)+'</p>';}).join('')+'</blockquote>'; continue; }

    // รายการ (รองรับย่อยตามการเยื้อง)
    if(/^\s*([-*+]|\d+\.)\s+/.test(l)){ flush();
      const block=[];
      while(i<lines.length && (/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) || (lines[i].trim()!=='' && /^\s{2,}\S/.test(lines[i]) && block.length))){
        block.push(lines[i]); i++;
      }
      html += renderList(block); continue;
    }

    // HTML ดิบ (เช่น <details>)
    if(/^\s*</.test(l)){ flush(); html += inline(l, true); i++; continue; }

    para.push(l); i++;
  }
  flush();
  return html;
}

// แปลงรายการที่มีการเยื้องเป็น <ul>/<ol> ซ้อนได้
function renderList(block){
  const items = [];
  for(const raw of block){
    const m = raw.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
    if(m){
      items.push({ indent:m[1].length, ordered:/\d+\./.test(m[2]), text:m[3], used:false });
    } else if(items.length){
      items[items.length-1].text += '<br>'+inline(raw.trim());
    }
  }
  if(!items.length) return '';
  const baseIndent = Math.min.apply(null, items.map(function(n){return n.indent;}));
  function build(parentIndent){
    let out='', ordered=null, open=false;
    for(let k=0;k<items.length;k++){
      const n=items[k];
      if(n.used) continue;
      if(n.indent!==parentIndent) continue;
      n.used=true;
      if(!open){ ordered=n.ordered; out+='<'+(ordered?'ol':'ul')+'>'; open=true; }
      // หาลูก (ระดับเยื้องมากกว่า) ที่อยู่ถัดไปก่อนจะกลับมาระดับเดิม
      let childIndent=null;
      for(let j=k+1;j<items.length;j++){
        if(items[j].indent<=parentIndent) break;
        if(!items[j].used){ childIndent=items[j].indent; break; }
      }
      let childHtml = (childIndent!==null) ? build(childIndent) : '';
      out+='<li>'+inline(n.text)+childHtml+'</li>';
    }
    if(open) out+='</'+(ordered?'ol':'ul')+'>';
    return out;
  }
  return build(baseIndent);
}

document.getElementById('content').innerHTML = render(MD);
</script>
</body>
</html>
