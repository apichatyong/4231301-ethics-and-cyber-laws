<script>
const MD = "# 📘 สรุปเนื้อหา: PDPA — กฎหมายคุ้มครองข้อมูลส่วนบุคคล\n### คาบ 1–3 | อ.ดุลยธรรม ระวังดี + Workshop อ.กิตติศักดิ์ | คะแนนย่อยรวม 20 คะแนน (มากสุดในวิชา)\n\n\u003e **อ่านไฟล์นี้ก่อน** แล้วค่อยไปทำแฟลชการ์ด → ข้อสอบปรนัย → ข้อสอบอัตนัย\n\u003e ธีมหลักของวิชา = **\"จริยธรรม + กฎหมาย\"** ทุกหลักการของ PDPA มี \"เหตุผลเชิงจริยธรรม\" อยู่เบื้องหลัง — ข้อสอบอัตนัยมักถามตรงนี้\n\n---\n\n## 0. ข้อมูลหลักที่ต้องจำขึ้นใจ (ออกปรนัยแน่)\n\n| รายการ              | คำตอบ                                                                  |\n| ------------------- | ---------------------------------------------------------------------- |\n| ชื่อกฎหมาย          | **พระราชบัญญัติคุ้มครองข้อมูลส่วนบุคคล พ.ศ. 2562** (PDPA)              |\n| บังคับใช้เต็มรูปแบบ | **1 มิถุนายน 2565**                                                    |\n| หน่วยงานกำกับ       | **สำนักงานคณะกรรมการคุ้มครองข้อมูลส่วนบุคคล (สคส. / PDPC)**            |\n| ต้นแบบ              | GDPR (สหภาพยุโรป), PDPA 2012 (สิงคโปร์)                                |\n| ฐานรัฐธรรมนูญ       | รัฐธรรมนูญ พ.ศ. 2560 **มาตรา 32** (สิทธิความเป็นอยู่ส่วนตัว)           |\n| โทษอาญาสูงสุด       | จำคุกไม่เกิน **1 ปี** และ/หรือ ปรับไม่เกิน **1,000,000 บาท** (ม.79–81) |\n| โทษทางปกครองสูงสุด  | ปรับไม่เกิน **5,000,000 บาท**                                          |\n\n---\n\n## 1. รากฐานจริยธรรมของ PDPA (5 เสาหลัก)\n\nกฎหมายไม่ได้มีแค่ \"บทลงโทษ\" แต่ตั้งอยู่บนคุณค่าทางจริยธรรม 5 เสา:\n\n1. **ศักดิ์ศรีความเป็นมนุษย์ (Human Dignity)** — ข้อมูลคือส่วนหนึ่งของตัวตน\n2. **สิทธิความเป็นส่วนตัว (Privacy)** — สิทธิควบคุมข้อมูลของตน\n3. **การกำหนดเจตนาตนเองด้านข้อมูล (Informational Self-Determination)** — เจ้าของข้อมูลตัดสินใจเองว่าข้อมูลจะถูกใช้อย่างไร *(แนวคิดแกนกลางของ PDPA สมัยใหม่)*\n4. **ความเป็นธรรมและความยุติธรรม (Fairness \u0026 Justice)** — ไม่เลือกปฏิบัติ ไม่เอาเปรียบ\n5. **ความรับผิดชอบและความโปร่งใส (Accountability \u0026 Transparency)**\n\n\u003e หลักจริยธรรมย่อยอื่นที่ควรรู้: Data Minimization, Purpose Limitation, Informed Consent, Non-Maleficence (ไม่ก่ออันตราย), Data Security\n\n---\n\n## 2. นิยามสำคัญ (Key Definitions)\n\n- **ข้อมูลส่วนบุคคล (Personal Data / PII)** — *มาตรา 6*: ข้อมูลเกี่ยวกับบุคคลซึ่งทำให้ **ระบุตัวบุคคลนั้นได้ ไม่ว่าทางตรงหรือทางอ้อม** แต่ **ไม่รวมข้อมูลของผู้ถึงแก่กรรม**\n  - ตัวอย่าง: ชื่อ, เลขบัตรประชาชน, ที่อยู่, location data, IP address, ข้อมูลสุขภาพ, ลายพิมพ์นิ้วมือ, รูปถ่าย\n- **เจ้าของข้อมูลส่วนบุคคล (Data Subject – DS)** — บุคคลที่ข้อมูลนั้นชี้ไปถึง (พนักงาน, ลูกค้า, คู่ค้า ฯลฯ)\n- **ผู้ควบคุมข้อมูลส่วนบุคคล (Data Controller – DC)** — ผู้มีอำนาจ **ตัดสินใจ** เกี่ยวกับการเก็บ/ใช้/เปิดเผยข้อมูล\n- **ผู้ประมวลผลข้อมูลส่วนบุคคล (Data Processor – DP)** — ผู้ดำเนินการ **ตามคำสั่ง** ของ DC\n- **เจ้าหน้าที่คุ้มครองข้อมูล (DPO)** — *มาตรา 41–42*\n- **Anonymization** — ทำให้ระบุตัวไม่ได้ → **พ้นจากการเป็นข้อมูลส่วนบุคคล**\n- **Pseudonymization** — แฝงข้อมูล (ยังเป็นข้อมูลส่วนบุคคลอยู่) เป็นเพียงมาตรการความปลอดภัย\n\n---\n\n## 3. ขอบเขตการบังคับใช้ (Scope)\n\n### มาตรา 4 — ข้อยกเว้น \"ไม่ใช้บังคับ\" (6 กรณี)\n1. ใช้เพื่อ **ประโยชน์ส่วนตน/กิจกรรมในครอบครัว**\n2. หน่วยงานรัฐด้าน **ความมั่นคง/การคลัง/ปราบฟอกเงิน/นิติวิทยาศาสตร์/ความมั่นคงไซเบอร์**\n3. **สื่อมวลชน ศิลปกรรม วรรณกรรม** ตามจริยธรรมวิชาชีพ\n4. **สภาผู้แทนฯ / วุฒิสภา / รัฐสภา**\n5. **การพิจารณาคดีของศาล** และกระบวนการยุติธรรมทางอาญา\n6. **บริษัทข้อมูลเครดิต** ตามกฎหมายเฉพาะ\n\n### มาตรา 5 — บังคับใช้ทั้งในและนอกประเทศ\n- DC/DP ที่อยู่ในไทย → ใช้บังคับ (ไม่ว่าประมวลผลที่ใด)\n- DC/DP อยู่นอกไทย → ใช้บังคับด้วย หากเป็นการ **เสนอขายสินค้า/บริการ** หรือ **เฝ้าติดตามพฤติกรรม** ของคนในไทย (ต้องตั้งตัวแทนในประเทศ)\n\n### มาตรา 7 — บังคับใช้ร่วมกับกฎหมายอื่น (กรณีมีกฎหมายเฉพาะ)\n\n---\n\n## 4. 🔑 ฐานการประมวลผลข้อมูล (Lawful Basis) — หัวใจของ PDPA\n\n**หลักสำคัญ:** ห้ามเก็บ/ใช้/เปิดเผยข้อมูลโดยไม่มี \"ฐาน\" รองรับ\nข้อมูล **ทั่วไป** มี **7 ฐาน** (ความยินยอม ม.19 + 6 ข้อยกเว้นความยินยอม ม.24):\n\n| #   | ฐาน (อังกฤษ)                                     | มาตรา              | ตัวอย่าง                    |\n| --- | ------------------------------------------------ | ------------------ | --------------------------- |\n| 1   | **ความยินยอม** Consent                           | ม.19 / ม.24 ว.1    | สมัครรับข่าวสารการตลาด      |\n| 2   | **สัญญา** Contract                               | ม.24(3)            | นายจ้างจ่ายเงินเดือนลูกจ้าง |\n| 3   | **หน้าที่ตามกฎหมาย** Legal Obligation            | ม.24(6)            | เปิดเผยเงินเดือนต่อสรรพากร  |\n| 4   | **ระงับอันตรายต่อชีวิต** Vital Interest          | ม.24(2) [+ม.26(1)] | ผู้ป่วยฉุกเฉินหมดสติ        |\n| 5   | **ภารกิจรัฐ/ประโยชน์สาธารณะ** Public Task        | ม.24(4)            | สำนักงานประกันสังคม         |\n| 6   | **ประโยชน์โดยชอบด้วยกฎหมาย** Legitimate Interest | ม.24(5)            | กล้องวงจรปิด CCTV           |\n| 7   | **วิจัย/สถิติ/จดหมายเหตุ** Research              | ม.24(1)            | งานวิจัยวิชาการ             |\n\n\u003e **จำง่าย:** Consent ไม่ใช่ฐานเดียว! ถ้าเข้า 6 ฐานอื่นได้ **ไม่ต้องขอความยินยอม** (แต่ยังต้องทำ Privacy Notice และหน้าที่อื่นครบ)\n\u003e **Legitimate Interest** ต้องทำ \"Balancing Test\" — ชั่งประโยชน์ของ DC กับสิทธิพื้นฐานของ DS\n\u003e **Public Task / Legal Obligation** → DS **ไม่มี**สิทธิขอลบ/โอนข้อมูล (แต่คัดค้านได้ในบางกรณี)\n\n---\n\n## 5. ความยินยอม (Consent) — มาตรา 19\n\nเงื่อนไขความยินยอมที่ชอบด้วยกฎหมาย:\n- ขอ **ก่อนหรือขณะ** เก็บรวบรวม\n- ทำโดย **ชัดแจ้ง เป็นหนังสือ หรือผ่านระบบอิเล็กทรอนิกส์**\n- **เป็นอิสระ** (ไม่เป็นเงื่อนไขบังคับเกินจำเป็น), ใช้ภาษาเข้าใจง่าย, **ไม่หลอกลวง**\n- **แยกส่วน** ชัดเจนจากข้อความอื่น\n- **ถอนความยินยอมเมื่อใดก็ได้** (ม.19 ว.5) ง่ายเท่ากับตอนให้\n- **ผู้เยาว์**: อายุ ≤ 10 ปี → ขอจากผู้ใช้อำนาจปกครอง; \u003e10 แต่ \u003c20 ปี → ดูว่านิติกรรมนั้นทำเองได้ไหม\n\n---\n\n## 6. ข้อมูลส่วนบุคคลอ่อนไหว (Sensitive Data) — มาตรา 26\n\n**นิยาม:** ข้อมูลที่หากรั่วไหลจะนำไปเลือกปฏิบัติ/สร้างความเสียหายร้ายแรง → คุ้มครองสูงกว่าปกติ\n\n**ประเภท (ท่องให้ได้):** เชื้อชาติ/เผ่าพันธุ์ · ความคิดเห็นการเมือง · ความเชื่อลัทธิ/ศาสนา/ปรัชญา · พฤติกรรมทางเพศ · ประวัติอาชญากรรม · ข้อมูลสุขภาพ · ความพิการ · ข้อมูลสหภาพแรงงาน · ข้อมูลพันธุกรรม (Genetic) · ข้อมูลชีวภาพ (Biometric)\n\n**หลัก:** ต้องขอ **ความยินยอมโดยชัดแจ้ง (Explicit Consent)** เว้นแต่เข้าข้อยกเว้น ม.26(1)–(5):\n1. ระงับอันตรายต่อชีวิต (เจ้าของให้ความยินยอมไม่ได้)\n2. กิจกรรมมูลนิธิ/สมาคม/องค์กรไม่แสวงกำไร (การเมือง/ศาสนา/สหภาพ) ให้แก่สมาชิก\n3. ข้อมูลที่ **เจ้าของเปิดเผยต่อสาธารณะเอง** ด้วยความยินยอมชัดแจ้ง\n4. จำเป็นเพื่อ **ก่อตั้ง/ใช้/ต่อสู้สิทธิเรียกร้องตามกฎหมาย**\n5. จำเป็นตามกฎหมายด้านเวชศาสตร์/สาธารณสุข/แรงงาน-ประกันสังคม/วิจัย/ประโยชน์สาธารณะสำคัญ\n\n\u003e ⚠️ **ม.24 ฐานสัญญาใช้กับ Sensitive Data ไม่ได้** — ต้องใช้ฐานของ ม.26 เท่านั้น\n\n---\n\n## 7. สิทธิของเจ้าของข้อมูล (Data Subject Rights) — มาตรา 30–36\n\n| สิทธิ | อังกฤษ | มาตรา |\n|---|---|---|\n| ได้รับการแจ้ง | Right to be informed | ม.23 |\n| เข้าถึง \u0026 ขอสำเนา | Right of Access | ม.30 |\n| โอนย้ายข้อมูล | Right to Data Portability | ม.31 |\n| คัดค้าน | Right to Object | ม.32 |\n| ขอให้ลบ/ทำลาย | Right to Erasure / to be forgotten | ม.33 |\n| ระงับการใช้ | Right to Restriction | ม.34 |\n| ขอแก้ไขให้ถูกต้อง | Right to Rectification | ม.36 |\n| ถอนความยินยอม | Right to Withdraw | ม.19 ว.5 |\n| ร้องเรียน | — | ม.73 |\n\n---\n\n## 8. หน้าที่ของผู้ควบคุมข้อมูล (DC) — มาตรา 37\n\n1. **จัดมาตรการความมั่นคงปลอดภัย** ที่เหมาะสม — ครอบคลุม **CIA**: Confidentiality (ความลับ) · Integrity (ความถูกต้องครบถ้วน) · Availability (พร้อมใช้งาน) [ม.37(1)]\n2. **ป้องกัน** มิให้ผู้รับข้อมูล (บุคคลที่สาม) ใช้/เปิดเผยโดยมิชอบ [ม.37(2)]\n3. **จัดระบบลบ/ทำลาย** ข้อมูลเมื่อพ้นกำหนด/หมดความจำเป็น [ม.37(3)]\n4. **แจ้งเหตุละเมิดข้อมูล** ต่อ สคส. ภายใน **72 ชั่วโมง** นับแต่ทราบ; หากเสี่ยงสูงต้องแจ้ง DS พร้อมแนวเยียวยา [ม.37(4)]\n5. (DC นอกประเทศ) ต้องตั้งตัวแทนในประเทศ\n\n**หน้าที่ DP — มาตรา 40:** ทำตามคำสั่ง DC, จัดมาตรการความปลอดภัย, แจ้งเหตุละเมิดต่อ **DC**, ทำ ROPA\n**ROPA (บันทึกรายการประมวลผล) — มาตรา 39:** บันทึกข้อมูลที่เก็บ/วัตถุประสงค์/ระยะเวลา/สิทธิเข้าถึง/มาตรการความปลอดภัย ฯลฯ\n\n---\n\n## 9. การโอนข้อมูลไปต่างประเทศ — มาตรา 28\n\nประเทศปลายทางต้องมี **\"มาตรฐานการคุ้มครองที่เพียงพอ\"** เว้นแต่: ปฏิบัติตามกฎหมาย / ได้รับความยินยอม (แจ้งว่ามาตรฐานไม่เพียงพอ) / จำเป็นตามสัญญา / ระงับอันตรายต่อชีวิต / ประโยชน์สาธารณะสำคัญ\n\n---\n\n## 10. ความรับผิดและบทลงโทษ\n\n- **ทางแพ่ง (ม.77–78):** ชดใช้ค่าสินไหมทดแทน + ศาลอาจสั่ง **ค่าสินไหมเพื่อการลงโทษ (punitive) ไม่เกิน 2 เท่า**\n- **ทางอาญา (ม.79–81):** จำคุกไม่เกิน 1 ปี และ/หรือปรับไม่เกิน 1,000,000 บาท\n- **ทางปกครอง:** ปรับสูงสุด 5,000,000 บาท\n- **บทเฉพาะกาล (ม.95):** ข้อมูลที่เก็บก่อนกฎหมายใช้บังคับ — ใช้ต่อได้ตามวัตถุประสงค์เดิม\n\n---\n\n## 11. 🎯 จุดเชื่อม \"จริยธรรม ↔ กฎหมาย\" (สำหรับข้อสอบอัตนัย)\n\n| หลักกฎหมาย PDPA | เหตุผลเชิงจริยธรรมเบื้องหลัง |\n|---|---|\n| Purpose Limitation (จำกัดวัตถุประสงค์) | ความไว้วางใจที่ได้รับต้องไม่ถูกนำไปใช้ผิดทาง |\n| Transparency / Privacy Notice | บุคคลควรรู้ว่าข้อมูลตนถูกใช้อย่างไร |\n| Data Minimization | ไม่ล่วงล้ำความเป็นส่วนตัวเกินจำเป็น |\n| Security (ม.37) | ผู้ได้รับความไว้วางใจต้องรับผิดชอบต่อข้อมูล |\n| Sensitive Data (ม.26) | ป้องกันการเลือกปฏิบัติ/ความเสียหายร้ายแรง |\n| เป้าหมายรวม = **Trust** | ถ้าประชาชนไม่เชื่อมั่น เศรษฐกิจดิจิทัลโตไม่ได้ |\n\n---\n\n## 12. แผนภูมิตัดสินใจ PDPA (จำลำดับคิด)\n\n```\nข้อมูลนั้นเป็น \"ข้อมูลส่วนบุคคล\" (ม.6) หรือไม่?\n   └─ ไม่ → ไม่อยู่ใต้ PDPA\n   └─ ใช่ → เข้าข้อยกเว้น ม.4 หรือไม่?\n              └─ ใช่ → ไม่อยู่ใต้ PDPA\n              └─ ไม่ → มี \"ฐานการประมวลผล\" รองรับหรือไม่? (7 ฐาน)\n                         └─ เป็น Sensitive Data? → ต้องใช้ฐาน ม.26 (ปกติ = ขอความยินยอมชัดแจ้ง)\n                         └─ ทำหน้าที่ DC ครบ: แจ้ง(ม.23)+ปลอดภัย(ม.37)+ROPA(ม.39)\n                         └─ เคารพสิทธิ DS (ม.30–36)\n```\n";
const C0 = String.fromCharCode(1), C1 = String.fromCharCode(2);  // ตัวคั่นชั่วคราวสำหรับ inline code

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// จัดรูปแบบ inline: code, ลิงก์, ตัวหนา, ตัวเอียง  (rawHtml=true จะไม่ escape < >)
function inline(t, rawHtml){
  let s = rawHtml ? t : esc(t);
  const codes = [];
  s = s.replace(/`([^`]+)`/g, function(m,c){ codes.push(c); return C0+(codes.length-1)+C1; });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(new RegExp(C0+'(\\d+)'+C1,'g'), function(m,i){ return '<code>'+codes[i]+'</code>'; });
  return s;
}

function isTableSep(l){ return /^\s*\|?[\s:|-]+\|?\s*$/.test(l) && l.indexOf('-')>=0; }
function splitRow(l){
  let s = l.trim().replace(/^\|/,'').replace(/\|$/,'');
  return s.split('|').map(function(c){ return c.trim(); });
}

function render(md){
  const lines = md.replace(/\r\n?/g,'\n').split('\n');
  let html = '', i = 0, para = [];
  const flush = function(){ if(para.length){ html += '<p>'+para.map(function(x){return inline(x);}).join('<br>')+'</p>'; para=[]; } };

  while(i < lines.length){
    let l = lines[i];

    if(l.trim()===''){ flush(); i++; continue; }

    // โค้ดบล็อก
    if(/^`/.test(l.trim())){ flush(); let buf=[]; i++;
      while(i<lines.length && !/^`/.test(lines[i].trim())){ buf.push(lines[i]); i++; }
      i++; html += '<pre><code>'+esc(buf.join('\n'))+'</code></pre>'; continue; }

    // หัวข้อ
    let h = l.match(/^(#{1,6})\s+(.*)$/);
    if(h){ flush(); const n=h[1].length; html += '<h'+n+'>'+inline(h[2])+'</h'+n+'>'; i++; continue; }

    // เส้นคั่น (--- หรือ *** หรือ ___) บรรทัดที่มีแต่อักขระเหล่านี้
    if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(l)){ flush(); html+='<hr>'; i++; continue; }

    // ตาราง
    if(l.trim().indexOf('|')===0 && i+1<lines.length && isTableSep(lines[i+1])){
      flush();
      const head = splitRow(l); i += 2;
      let rows = [];
      while(i<lines.length && lines[i].trim().indexOf('|')===0){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+head.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>'; }
      html += t+'</tbody></table>'; continue;
    }

    // blockquote
    if(/^\s*>/.test(l)){ flush(); let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      html += '<blockquote>'+buf.map(function(x){return x.trim()===''?'':'<p>'+inline(x)+'</p>';}).join('')+'</blockquote>'; continue; }

    // รายการ (รองรับย่อยตามการเยื้อง)
    if(/^\s*([-*+]|\d+\.)\s+/.test(l)){ flush();
      const block=[];
      while(i<lines.length && (/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) || (lines[i].trim()!=='' && /^\s{2,}\S/.test(lines[i]) && block.length))){
        block.push(lines[i]); i++;
      }
      html += renderList(block); continue;
    }

    // HTML ดิบ (เช่น <details>)
    if(/^\s*</.test(l)){ flush(); html += inline(l, true); i++; continue; }

    para.push(l); i++;
  }
  flush();
  return html;
}

// แปลงรายการที่มีการเยื้องเป็น <ul>/<ol> ซ้อนได้
function renderList(block){
  const items = [];
  for(const raw of block){
    const m = raw.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
    if(m){
      items.push({ indent:m[1].length, ordered:/\d+\./.test(m[2]), text:m[3], used:false });
    } else if(items.length){
      items[items.length-1].text += '<br>'+inline(raw.trim());
    }
  }
  if(!items.length) return '';
  const baseIndent = Math.min.apply(null, items.map(function(n){return n.indent;}));
  function build(parentIndent){
    let out='', ordered=null, open=false;
    for(let k=0;k<items.length;k++){
      const n=items[k];
      if(n.used) continue;
      if(n.indent!==parentIndent) continue;
      n.used=true;
      if(!open){ ordered=n.ordered; out+='<'+(ordered?'ol':'ul')+'>'; open=true; }
      // หาลูก (ระดับเยื้องมากกว่า) ที่อยู่ถัดไปก่อนจะกลับมาระดับเดิม
      let childIndent=null;
      for(let j=k+1;j<items.length;j++){
        if(items[j].indent<=parentIndent) break;
        if(!items[j].used){ childIndent=items[j].indent; break; }
      }
      let childHtml = (childIndent!==null) ? build(childIndent) : '';
      out+='<li>'+inline(n.text)+childHtml+'</li>';
    }
    if(open) out+='</'+(ordered?'ol':'ul')+'>';
    return out;
  }
  return build(baseIndent);
}

document.getElementById('content').innerHTML = render(MD);
</script>
