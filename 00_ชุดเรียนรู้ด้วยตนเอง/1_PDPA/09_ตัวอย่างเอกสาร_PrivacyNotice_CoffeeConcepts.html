<style>
  :root{--bg:#0f172a;--paper:#111c33;--txt:#e6edf6;--muted:#9fb0c7;--accent:#38bdf8;--line:#2b3a52;--hl:#fcd34d}

  body{margin:0;background:var(--bg);color:var(--txt);font-family:"Sarabun","Segoe UI",Tahoma,sans-serif;line-height:1.75}

          padding:10px 16px;display:flex;gap:14px;align-items:center;z-index:50;font-size:14px}

<script>
const MD = "# 📄 ตัวอย่างเอกสาร: Privacy Notice ฉบับ Coffee Concepts\n### ต้นแบบประกาศความเป็นส่วนตัว (สำหรับลูกค้า) — ร่างเพื่อการศึกษา PDPA\n\u003e ใช้เป็นตัวอย่างประกอบขั้นที่ 5 | ครบ 8 องค์ประกอบที่อาจารย์ระบุ | หมายเหตุ 🔖 = จุดเชื่อมมาตรา\n\n---\n---\n\n# ประกาศความเป็นส่วนตัว (Privacy Notice)\n## บริษัท คอฟฟี่ คอนเซ็ปต์ รีเทล จำกัด\n\n**ปรับปรุงล่าสุด:** 1 มิถุนายน 2569 | **เวอร์ชัน:** 1.0\n\nบริษัท คอฟฟี่ คอนเซ็ปต์ รีเทล จำกัด (\"**บริษัทฯ**\" หรือ \"**เรา**\") เคารพสิทธิความเป็นส่วนตัวของท่าน และให้ความสำคัญกับการคุ้มครองข้อมูลส่วนบุคคลตามพระราชบัญญัติคุ้มครองข้อมูลส่วนบุคคล พ.ศ. 2562 ประกาศฉบับนี้อธิบายว่าเราเก็บรวบรวม ใช้ และเปิดเผยข้อมูลส่วนบุคคลของท่านอย่างไร\n\n---\n\n### 1. ผู้ควบคุมข้อมูลส่วนบุคคล 🔖 *(ระบุ DC + ช่องทางติดต่อ)*\nบริษัท คอฟฟี่ คอนเซ็ปต์ รีเทล จำกัด\nที่อยู่: [เลขที่ ... กรุงเทพมหานคร]\nเจ้าหน้าที่คุ้มครองข้อมูลส่วนบุคคล (DPO): dpo@coffee-concepts.co.th | โทร 0-2xxx-xxxx\n\n---\n\n### 2. ข้อมูลส่วนบุคคลที่เราเก็บรวบรวม 🔖 *(ประเภทข้อมูล)*\n| ประเภท | ตัวอย่างข้อมูล |\n|---|---|\n| ข้อมูลระบุตัวตน | ชื่อ-นามสกุล, เบอร์โทรศัพท์, อีเมล |\n| ข้อมูลบัญชีสมาชิก | รหัสสมาชิก, คะแนนสะสม, ประวัติการสั่งซื้อ |\n| ข้อมูลการชำระเงิน | ข้อมูลบัตร/ช่องทางชำระเงิน (ผ่านผู้ให้บริการที่ได้มาตรฐาน) |\n| ข้อมูลการใช้งานดิจิทัล | Cookies, IP address, พฤติกรรมการใช้แอป/เว็บไซต์ |\n| ภาพจากกล้องวงจรปิด (CCTV) | ภาพขณะเข้าใช้บริการในสาขา |\n\n\u003e เรา**ไม่เก็บข้อมูลอ่อนไหว** (เช่น ศาสนา สุขภาพ) เว้นแต่จำเป็นและได้รับความยินยอมโดยชัดแจ้ง 🔖 *(ม.26)*\n\n---\n\n### 3. แหล่งที่มาของข้อมูล 🔖 *(แหล่งที่มา)*\n- จากท่านโดยตรง (สมัครสมาชิก/สั่งซื้อ/ติดต่อเรา)\n- จากการใช้งานเว็บไซต์/แอปพลิเคชันของเราโดยอัตโนมัติ (Cookies)\n- จากกล้องวงจรปิดภายในสาขา\n\n---\n\n### 4. วัตถุประสงค์และฐานทางกฎหมายในการประมวลผล 🔖 *(วัตถุประสงค์ + ฐานกฎหมาย — หัวใจของ Notice)*\n| วัตถุประสงค์ | ฐานกฎหมาย (PDPA) |\n|---|---|\n| ดำเนินการสั่งซื้อ/จัดส่งสินค้า | **ฐานสัญญา (ม.24(3))** |\n| บริหารระบบสมาชิก/สะสมคะแนน | **ฐานสัญญา (ม.24(3))** |\n| ส่งข่าวสาร/โปรโมชั่นการตลาด | **ฐานความยินยอม (ม.19)** |\n| วิเคราะห์พฤติกรรมเพื่อพัฒนาบริการ | **ฐานความยินยอม (ม.19)** |\n| รักษาความปลอดภัย (CCTV) | **ฐานประโยชน์โดยชอบด้วยกฎหมาย (ม.24(5))** |\n| ปฏิบัติตามกฎหมาย/ภาษี | **ฐานหน้าที่ตามกฎหมาย (ม.24(6))** |\n\n---\n\n### 5. การเปิดเผยและการส่งต่อข้อมูล 🔖 *(การส่งต่อ + ต่างประเทศ)*\nเราอาจเปิดเผยข้อมูลให้แก่:\n- ผู้ให้บริการที่ทำงานในนามของเรา (เช่น ผู้ให้บริการระบบชำระเงิน, ขนส่ง, Payroll) ภายใต้ **ข้อตกลงประมวลผลข้อมูล (DPA)**\n- หน่วยงานราชการเมื่อมีกฎหมายกำหนด\n\u003e กรณีส่งข้อมูลไปต่างประเทศ จะดำเนินการเมื่อประเทศปลายทางมีมาตรฐานคุ้มครองที่เพียงพอ 🔖 *(ม.28)*\n\n---\n\n### 6. ระยะเวลาการจัดเก็บข้อมูล 🔖 *(ระยะเวลาเก็บ — Retention)*\n- ข้อมูลสมาชิก: ตลอดระยะเวลาเป็นสมาชิก + 1 ปีหลังยกเลิก\n- ภาพ CCTV: **30 วัน**\n- ข้อมูลที่ต้องเก็บตามกฎหมายภาษี: ตามที่กฎหมายกำหนด\n\u003e เมื่อพ้นกำหนด เราจะลบ/ทำลาย หรือทำให้เป็นข้อมูลที่ระบุตัวบุคคลไม่ได้\n\n---\n\n### 7. มาตรการรักษาความมั่นคงปลอดภัย 🔖 *(Security — ม.37(1), หลัก CIA)*\nเรามีมาตรการป้องกันที่เหมาะสมเพื่อรักษา **ความลับ (Confidentiality) ความถูกต้องครบถ้วน (Integrity) และสภาพพร้อมใช้งาน (Availability)** เช่น การกำหนดสิทธิเข้าถึง การเข้ารหัส และการสำรองข้อมูล\n\n---\n\n### 8. สิทธิของเจ้าของข้อมูลส่วนบุคคล 🔖 *(สิทธิ ม.30–36, ม.19 ว.5)*\nท่านมีสิทธิ: เข้าถึง/ขอสำเนา (ม.30) · โอนย้าย (ม.31) · คัดค้าน (ม.32) · ขอให้ลบ (ม.33) · ระงับการใช้ (ม.34) · แก้ไขให้ถูกต้อง (ม.36) · ถอนความยินยอม (ม.19 ว.5) · ร้องเรียน (ม.73)\n\u003e ใช้สิทธิได้โดยกรอก **แบบคำร้องขอใช้สิทธิ** และส่งมาที่ dpo@coffee-concepts.co.th\n\n---\n\n### 9. ช่องทางการติดต่อ 🔖 *(ช่องทางติดต่อ)*\nเจ้าหน้าที่คุ้มครองข้อมูลส่วนบุคคล (DPO)\nอีเมล: dpo@coffee-concepts.co.th | โทร: 0-2xxx-xxxx\nหากท่านเห็นว่าเราไม่ปฏิบัติตามกฎหมาย ท่านมีสิทธิร้องเรียนต่อสำนักงานคณะกรรมการคุ้มครองข้อมูลส่วนบุคคล (สคส.)\n\n---\n---\n\n## 🎓 หมายเหตุการเรียน — เช็กลิสต์ 8 องค์ประกอบ (ตรงกับที่อาจารย์สอน)\n| องค์ประกอบที่อาจารย์ระบุ | อยู่ข้อ |\n|---|---|\n| วัตถุประสงค์ + ฐานกฎหมาย | ✅ ข้อ 4 |\n| ประเภทข้อมูล | ✅ ข้อ 2 |\n| แหล่งที่มา | ✅ ข้อ 3 |\n| ระยะเวลาเก็บ | ✅ ข้อ 6 |\n| การส่งต่อ/ต่างประเทศ | ✅ ข้อ 5 |\n| มาตรการความปลอดภัย | ✅ ข้อ 7 |\n| สิทธิเจ้าของข้อมูล | ✅ ข้อ 8 |\n| ช่องทางติดต่อ | ✅ ข้อ 1 + 9 |\n\n\u003e 💡 **ข้อสอบอาจให้ดู Privacy Notice แล้วถามว่า \"ขาดองค์ประกอบใด\"** — ใช้เช็กลิสต์นี้ตรวจ\n\u003e ⚠️ จุดสำคัญ: Privacy Notice = **\"แจ้งให้ทราบ\" (ตาม ม.23)** ≠ Consent Form ที่ใช้ **\"ขอความยินยอม\" (ม.19)** — อย่าสับสน 2 ตัวนี้\n";
const C0 = String.fromCharCode(1), C1 = String.fromCharCode(2);  // ตัวคั่นชั่วคราวสำหรับ inline code

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// จัดรูปแบบ inline: code, ลิงก์, ตัวหนา, ตัวเอียง  (rawHtml=true จะไม่ escape < >)
function inline(t, rawHtml){
  let s = rawHtml ? t : esc(t);
  const codes = [];
  s = s.replace(/`([^`]+)`/g, function(m,c){ codes.push(c); return C0+(codes.length-1)+C1; });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(new RegExp(C0+'(\\d+)'+C1,'g'), function(m,i){ return '<code>'+codes[i]+'</code>'; });
  return s;
}

function isTableSep(l){ return /^\s*\|?[\s:|-]+\|?\s*$/.test(l) && l.indexOf('-')>=0; }
function splitRow(l){
  let s = l.trim().replace(/^\|/,'').replace(/\|$/,'');
  return s.split('|').map(function(c){ return c.trim(); });
}

function render(md){
  const lines = md.replace(/\r\n?/g,'\n').split('\n');
  let html = '', i = 0, para = [];
  const flush = function(){ if(para.length){ html += '<p>'+para.map(function(x){return inline(x);}).join('<br>')+'</p>'; para=[]; } };

  while(i < lines.length){
    let l = lines[i];

    if(l.trim()===''){ flush(); i++; continue; }

    // โค้ดบล็อก
    if(/^`/.test(l.trim())){ flush(); let buf=[]; i++;
      while(i<lines.length && !/^`/.test(lines[i].trim())){ buf.push(lines[i]); i++; }
      i++; html += '<pre><code>'+esc(buf.join('\n'))+'</code></pre>'; continue; }

    // หัวข้อ
    let h = l.match(/^(#{1,6})\s+(.*)$/);
    if(h){ flush(); const n=h[1].length; html += '<h'+n+'>'+inline(h[2])+'</h'+n+'>'; i++; continue; }

    // เส้นคั่น (--- หรือ *** หรือ ___) บรรทัดที่มีแต่อักขระเหล่านี้
    if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(l)){ flush(); html+='<hr>'; i++; continue; }

    // ตาราง
    if(l.trim().indexOf('|')===0 && i+1<lines.length && isTableSep(lines[i+1])){
      flush();
      const head = splitRow(l); i += 2;
      let rows = [];
      while(i<lines.length && lines[i].trim().indexOf('|')===0){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+head.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>'; }
      html += t+'</tbody></table>'; continue;
    }

    // blockquote
    if(/^\s*>/.test(l)){ flush(); let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      html += '<blockquote>'+buf.map(function(x){return x.trim()===''?'':'<p>'+inline(x)+'</p>';}).join('')+'</blockquote>'; continue; }

    // รายการ (รองรับย่อยตามการเยื้อง)
    if(/^\s*([-*+]|\d+\.)\s+/.test(l)){ flush();
      const block=[];
      while(i<lines.length && (/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) || (lines[i].trim()!=='' && /^\s{2,}\S/.test(lines[i]) && block.length))){
        block.push(lines[i]); i++;
      }
      html += renderList(block); continue;
    }

    // HTML ดิบ (เช่น <details>)
    if(/^\s*</.test(l)){ flush(); html += inline(l, true); i++; continue; }

    para.push(l); i++;
  }
  flush();
  return html;
}

// แปลงรายการที่มีการเยื้องเป็น <ul>/<ol> ซ้อนได้
function renderList(block){
  const items = [];
  for(const raw of block){
    const m = raw.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
    if(m){
      items.push({ indent:m[1].length, ordered:/\d+\./.test(m[2]), text:m[3], used:false });
    } else if(items.length){
      items[items.length-1].text += '<br>'+inline(raw.trim());
    }
  }
  if(!items.length) return '';
  const baseIndent = Math.min.apply(null, items.map(function(n){return n.indent;}));
  function build(parentIndent){
    let out='', ordered=null, open=false;
    for(let k=0;k<items.length;k++){
      const n=items[k];
      if(n.used) continue;
      if(n.indent!==parentIndent) continue;
      n.used=true;
      if(!open){ ordered=n.ordered; out+='<'+(ordered?'ol':'ul')+'>'; open=true; }
      // หาลูก (ระดับเยื้องมากกว่า) ที่อยู่ถัดไปก่อนจะกลับมาระดับเดิม
      let childIndent=null;
      for(let j=k+1;j<items.length;j++){
        if(items[j].indent<=parentIndent) break;
        if(!items[j].used){ childIndent=items[j].indent; break; }
      }
      let childHtml = (childIndent!==null) ? build(childIndent) : '';
      out+='<li>'+inline(n.text)+childHtml+'</li>';
    }
    if(open) out+='</'+(ordered?'ol':'ul')+'>';
    return out;
  }
  return build(baseIndent);
}

document.getElementById('content').innerHTML = render(MD);
</script>
