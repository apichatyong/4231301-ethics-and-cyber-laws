<title>✍️ ข้อสอบอัตนัย / วิเคราะห์เคส PDPA</title>
<style>
  :root{--bg:#0f172a;--paper:#111c33;--txt:#e6edf6;--muted:#9fb0c7;--accent:#38bdf8;--line:#2b3a52;--hl:#fcd34d}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:"Sarabun","Segoe UI",Tahoma,sans-serif;line-height:1.75}
  .topnav{position:sticky;top:0;background:#0b1322ee;backdrop-filter:blur(6px);border-bottom:1px solid var(--line);
          padding:10px 16px;display:flex;gap:14px;align-items:center;z-index:50;font-size:14px}
  .topnav a{color:var(--muted);text-decoration:none;padding:5px 11px;border:1px solid var(--line);border-radius:999px}
  .topnav a:hover{color:var(--accent);border-color:var(--accent)}
  main{max-width:860px;margin:0 auto;padding:30px 22px 80px}
  h1,h2,h3,h4{line-height:1.35;margin:1.5em 0 .6em;font-weight:700}
  h1{font-size:27px;border-bottom:2px solid var(--accent);padding-bottom:.3em;margin-top:.3em}
  h2{font-size:22px;color:#bfe6fb;border-bottom:1px solid var(--line);padding-bottom:.25em}
  h3{font-size:18px;color:#a7d8f0}
  h4{font-size:16px;color:var(--muted)}
  p{margin:.7em 0}
  strong{color:#fff;font-weight:700;background:linear-gradient(transparent 62%,#fcd34d33 62%)}
  em{color:#fbcfe8;font-style:italic}
  code{background:#0b1322;border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:.92em;color:#7dd3fc;
       font-family:"Cascadia Code",Consolas,monospace}
  pre{background:#0b1322;border:1px solid var(--line);border-radius:10px;padding:14px 16px;overflow:auto}
  pre code{border:none;padding:0;background:none}
  a{color:var(--accent)}
  ul,ol{margin:.5em 0 .9em;padding-left:1.6em}
  li{margin:.3em 0}
  ul ul,ol ol,ul ol,ol ul{margin:.2em 0}
  blockquote{margin:1em 0;padding:.6em 1em;border-left:4px solid var(--accent);background:#0b132288;border-radius:0 8px 8px 0;color:#cdd9e8}
  blockquote p{margin:.3em 0}
  hr{border:none;border-top:1px dashed var(--line);margin:1.8em 0}
  table{border-collapse:collapse;width:100%;margin:1em 0;font-size:15px;display:block;overflow-x:auto}
  th,td{border:1px solid var(--line);padding:9px 12px;text-align:left;vertical-align:top}
  th{background:#16263f;color:#bfe6fb;font-weight:700}
  tr:nth-child(even) td{background:#0f1c30}
  details{background:#0b1322;border:1px solid var(--line);border-radius:8px;padding:8px 14px;margin:.7em 0}
  summary{cursor:pointer;color:var(--accent);font-weight:600}
  ::selection{background:#38bdf855}
</style>

<body>
  <div class="topnav">
    <a href="../หน้าแรก.html">🏠 หน้าแรก</a>

    <a href="javascript:window.print()">🖨️ พิมพ์/บันทึก PDF</a>
  </div>
  <main id="content"></main>

<script>
const MD = "# ✍️ ข้อสอบอัตนัย / วิเคราะห์เคส PDPA\n### วิธีใช้: ฝึกเขียนตอบตาม **โครง 4 ขั้น** ก่อนดูแนวคำตอบ\n\n\u003e **โครงคำตอบมาตรฐาน (ใช้ได้ทุกข้อ):**\n\u003e 1. **ข้อเท็จจริง** — สรุปประเด็นปัญหาสั้น ๆ\n\u003e 2. **ข้อกฎหมาย** — ยกมาตรา/หลักการ PDPA ที่เกี่ยวข้อง\n\u003e 3. **วินิจฉัย** — ปรับข้อเท็จจริงเข้ากับข้อกฎหมาย (ชอบ/ไม่ชอบด้วยกฎหมายเพราะอะไร)\n\u003e 4. **สรุป + มิติจริยธรรม** — ตอบคำถาม และเชื่อมโยง \"จริยธรรมเบื้องหลัง\"\n\n---\n\n## ข้อ 1 — ฐานการประมวลผล \u0026 ความยินยอม\nบริษัท A เปิดให้ลูกค้าสมัครรับข่าวสารส่วนลดทางอีเมล แต่ในแบบฟอร์มเดียวกันมีการ **บังคับติ๊กยินยอม** ให้บริษัทขายข้อมูลลูกค้าต่อให้พันธมิตรทางธุรกิจ มิฉะนั้นจะสมัครไม่ได้\n**คำถาม:** การขอความยินยอมของบริษัท A ชอบด้วย PDPA หรือไม่ เพราะเหตุใด\n\n\u003cdetails\u003e\u003csummary\u003eดูแนวคำตอบ\u003c/summary\u003e\n\n- **ข้อกฎหมาย:** ม.19 — ความยินยอมต้อง **เป็นอิสระ (freely given)**, **แยกส่วนชัดเจน**, ไม่เป็นเงื่อนไขบังคับเกินจำเป็น\n- **วินิจฉัย:** การบังคับติ๊กยินยอมขายข้อมูลเป็นเงื่อนไขของการสมัครรับข่าวสาร = ความยินยอม **ไม่เป็นอิสระ** และไม่แยกวัตถุประสงค์ → **ไม่ชอบด้วยกฎหมาย**\n- **สรุป+จริยธรรม:** ขัดหลัก Informed Consent และ Purpose Limitation; เชิงจริยธรรมคือการเอาเปรียบเจ้าของข้อมูลและทำลายความไว้วางใจ บริษัทต้องแยกการยินยอมขายข้อมูลออกเป็นทางเลือกอิสระ\n\u003c/details\u003e\n\n---\n\n## ข้อ 2 — ข้อมูลอ่อนไหว (Sensitive Data)\nโรงพยาบาลแห่งหนึ่งนำ **ข้อมูลสุขภาพ** ของผู้ป่วยไปวิเคราะห์เพื่อส่งโฆษณาอาหารเสริมให้ตรงกลุ่มโรค โดยอ้างว่าผู้ป่วยเคยเซ็นยินยอมรับการรักษาแล้ว\n**คำถาม:** โรงพยาบาลทำได้หรือไม่ และข้อมูลสุขภาพมีสถานะพิเศษอย่างไร\n\n\u003cdetails\u003e\u003csummary\u003eดูแนวคำตอบ\u003c/summary\u003e\n\n- **ข้อกฎหมาย:** ม.26 — ข้อมูลสุขภาพเป็น **ข้อมูลอ่อนไหว** ต้องขอ **ความยินยอมโดยชัดแจ้ง**; ม.27 — ใช้ตามวัตถุประสงค์ที่แจ้งไว้เท่านั้น (Purpose Limitation)\n- **วินิจฉัย:** ความยินยอม \"เพื่อการรักษา\" ใช้กับ \"การตลาด\" ไม่ได้ — เปลี่ยนวัตถุประสงค์ต้องขอยินยอมใหม่ และต้องเป็น Explicit Consent เพราะเป็น Sensitive Data → **ทำไม่ได้**\n- **สรุป+จริยธรรม:** ละเมิด Purpose Limitation + คุ้มครองข้อมูลอ่อนไหว; เหตุผลจริยธรรม = ข้อมูลสุขภาพหากรั่ว/ใช้ผิดอาจนำไปเลือกปฏิบัติและสร้างความเสียหายร้ายแรง\n\u003c/details\u003e\n\n---\n\n## ข้อ 3 — เหตุละเมิดข้อมูล (Data Breach)\nบริษัท B ถูกแฮกเซิร์ฟเวอร์ ทำให้ข้อมูลลูกค้า 50,000 รายรั่วไหล ทีมไอทีทราบเหตุวันจันทร์ แต่ผู้บริหารตัดสินใจ \"รอดูสถานการณ์\" และแจ้งสำนักงานฯ หลังผ่านไป 6 วัน\n**คำถาม:** บริษัท B ปฏิบัติถูกต้องตาม PDPA หรือไม่ ควรทำอย่างไร\n\n\u003cdetails\u003e\u003csummary\u003eดูแนวคำตอบ\u003c/summary\u003e\n\n- **ข้อกฎหมาย:** ม.37(4) — DC ต้องแจ้งเหตุละเมิดต่อ สคส. ภายใน **72 ชั่วโมง** นับแต่ทราบ; หากเสี่ยงสูงต้องแจ้งเจ้าของข้อมูลพร้อมแนวทางเยียวยา\n- **วินิจฉัย:** แจ้งช้าเกิน 72 ชม. (6 วัน) โดยไม่มีเหตุอันควร → **ผิดหน้าที่ DC**; ข้อมูล 50,000 รายถือเป็นความเสี่ยงสูง ต้องแจ้ง DS ด้วย\n- **สรุป+จริยธรรม:** ควรแจ้ง สคส. ภายใน 72 ชม. + แจ้งลูกค้า + ระงับเหตุและเยียวยา; จริยธรรม = ความรับผิดชอบ (Accountability) และความโปร่งใส ไม่ปิดบังผู้เสียหาย\n\u003c/details\u003e\n\n---\n\n## ข้อ 4 — สิทธิเจ้าของข้อมูล\nนายดำเคยสมัครสมาชิกเว็บไซต์หนึ่ง ต่อมาต้องการเลิกใช้และ **ขอให้ลบข้อมูลทั้งหมด** แต่เว็บไซต์ปฏิเสธโดยอ้างว่า \"เก็บไว้เผื่ออนาคต\"\n**คำถาม:** นายดำมีสิทธิใดบ้าง และเว็บไซต์ปฏิเสธได้หรือไม่\n\n\u003cdetails\u003e\u003csummary\u003eดูแนวคำตอบ\u003c/summary\u003e\n\n- **ข้อกฎหมาย:** ม.33 สิทธิขอลบ/ทำลาย (Right to be forgotten); ม.37(3) DC ต้องมีระบบลบข้อมูลเมื่อหมดความจำเป็น; ม.22 เก็บเท่าที่จำเป็น (Data Minimization)\n- **วินิจฉัย:** เมื่อหมดวัตถุประสงค์/ถอนความยินยอมแล้ว เจ้าของมีสิทธิขอลบได้ การ \"เก็บเผื่ออนาคต\" ไม่ใช่เหตุผลที่ชอบด้วยกฎหมาย → เว็บไซต์ **ปฏิเสธไม่ได้** (เว้นแต่มีฐานกฎหมายอื่นเช่นหน้าที่ตามกฎหมายให้เก็บต่อ)\n- **สรุป+จริยธรรม:** ต้องลบข้อมูล; จริยธรรม = เคารพการกำหนดเจตนาตนเอง (Informational Self-Determination) และไม่เก็บเกินจำเป็น\n\u003c/details\u003e\n\n---\n\n## ข้อ 5 — บูรณาการจริยธรรม + กฎหมาย (ข้อพรีเมียม ออกบ่อย)\n**คำถาม:** จงอธิบายว่า PDPA \"ไม่ได้มีเป้าหมายเพียงลงโทษ\" แต่ตั้งอยู่บนรากฐานจริยธรรมอย่างไร พร้อมยกหลักจริยธรรมอย่างน้อย 3 ข้อ และเชื่อมกับบทบัญญัติของกฎหมาย\n\n\u003cdetails\u003e\u003csummary\u003eดูแนวคำตอบ (โครง)\u003c/summary\u003e\n\nยก 3 คู่ \"จริยธรรม → กฎหมาย\" เช่น\n1. **การกำหนดเจตนาตนเอง** → สิทธิเจ้าของข้อมูล ม.30–36 + ความยินยอม ม.19\n2. **ความโปร่งใส (Transparency)** → หน้าที่แจ้ง/Privacy Notice ม.23\n3. **ความรับผิดชอบ (Accountability)** → มาตรการความปลอดภัย ม.37, ROPA ม.39, แจ้งเหตุละเมิด 72 ชม.\n\nปิดท้าย: เป้าหมายสูงสุดคือ **Trust** — สร้างความไว้วางใจให้สังคม/เศรษฐกิจดิจิทัลเติบโต กฎหมายเป็นเพียงเครื่องมือบังคับให้คุณค่าจริยธรรมเหล่านี้เกิดขึ้นจริง\n\u003c/details\u003e\n\n---\n\n### 💡 เคล็ดลับเขียนอัตนัยให้ได้คะแนนเต็ม\n- **อ้างเลขมาตราเสมอ** (แม้จำไม่เป๊ะ ให้ระบุชื่อหลักการ เช่น \"หลักจำกัดวัตถุประสงค์\")\n- เขียนตามโครง 4 ขั้น อย่าตอบลอย ๆ\n- **ทุกข้อปิดด้วยมิติจริยธรรม** — เป็นจุดที่ทำให้ได้คะแนนเหนือคนอื่นในวิชานี้\n- ใช้ศัพท์อังกฤษกำกับ (Consent, Data Controller, Legitimate Interest) แสดงความเข้าใจ\n";
const C0 = String.fromCharCode(1), C1 = String.fromCharCode(2);  // ตัวคั่นชั่วคราวสำหรับ inline code

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// จัดรูปแบบ inline: code, ลิงก์, ตัวหนา, ตัวเอียง  (rawHtml=true จะไม่ escape < >)
function inline(t, rawHtml){
  let s = rawHtml ? t : esc(t);
  const codes = [];
  s = s.replace(/`([^`]+)`/g, function(m,c){ codes.push(c); return C0+(codes.length-1)+C1; });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(new RegExp(C0+'(\\d+)'+C1,'g'), function(m,i){ return '<code>'+codes[i]+'</code>'; });
  return s;
}

function isTableSep(l){ return /^\s*\|?[\s:|-]+\|?\s*$/.test(l) && l.indexOf('-')>=0; }
function splitRow(l){
  let s = l.trim().replace(/^\|/,'').replace(/\|$/,'');
  return s.split('|').map(function(c){ return c.trim(); });
}

function render(md){
  const lines = md.replace(/\r\n?/g,'\n').split('\n');
  let html = '', i = 0, para = [];
  const flush = function(){ if(para.length){ html += '<p>'+para.map(function(x){return inline(x);}).join('<br>')+'</p>'; para=[]; } };

  while(i < lines.length){
    let l = lines[i];

    if(l.trim()===''){ flush(); i++; continue; }

    // โค้ดบล็อก
    if(/^`/.test(l.trim())){ flush(); let buf=[]; i++;
      while(i<lines.length && !/^`/.test(lines[i].trim())){ buf.push(lines[i]); i++; }
      i++; html += '<pre><code>'+esc(buf.join('\n'))+'</code></pre>'; continue; }

    // หัวข้อ
    let h = l.match(/^(#{1,6})\s+(.*)$/);
    if(h){ flush(); const n=h[1].length; html += '<h'+n+'>'+inline(h[2])+'</h'+n+'>'; i++; continue; }

    // เส้นคั่น (--- หรือ *** หรือ ___) บรรทัดที่มีแต่อักขระเหล่านี้
    if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(l)){ flush(); html+='<hr>'; i++; continue; }

    // ตาราง
    if(l.trim().indexOf('|')===0 && i+1<lines.length && isTableSep(lines[i+1])){
      flush();
      const head = splitRow(l); i += 2;
      let rows = [];
      while(i<lines.length && lines[i].trim().indexOf('|')===0){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+head.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>'; }
      html += t+'</tbody></table>'; continue;
    }

    // blockquote
    if(/^\s*>/.test(l)){ flush(); let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      html += '<blockquote>'+buf.map(function(x){return x.trim()===''?'':'<p>'+inline(x)+'</p>';}).join('')+'</blockquote>'; continue; }

    // รายการ (รองรับย่อยตามการเยื้อง)
    if(/^\s*([-*+]|\d+\.)\s+/.test(l)){ flush();
      const block=[];
      while(i<lines.length && (/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) || (lines[i].trim()!=='' && /^\s{2,}\S/.test(lines[i]) && block.length))){
        block.push(lines[i]); i++;
      }
      html += renderList(block); continue;
    }

    // HTML ดิบ (เช่น <details>)
    if(/^\s*</.test(l)){ flush(); html += inline(l, true); i++; continue; }

    para.push(l); i++;
  }
  flush();
  return html;
}

// แปลงรายการที่มีการเยื้องเป็น <ul>/<ol> ซ้อนได้
function renderList(block){
  const items = [];
  for(const raw of block){
    const m = raw.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
    if(m){
      items.push({ indent:m[1].length, ordered:/\d+\./.test(m[2]), text:m[3], used:false });
    } else if(items.length){
      items[items.length-1].text += '<br>'+inline(raw.trim());
    }
  }
  if(!items.length) return '';
  const baseIndent = Math.min.apply(null, items.map(function(n){return n.indent;}));
  function build(parentIndent){
    let out='', ordered=null, open=false;
    for(let k=0;k<items.length;k++){
      const n=items[k];
      if(n.used) continue;
      if(n.indent!==parentIndent) continue;
      n.used=true;
      if(!open){ ordered=n.ordered; out+='<'+(ordered?'ol':'ul')+'>'; open=true; }
      // หาลูก (ระดับเยื้องมากกว่า) ที่อยู่ถัดไปก่อนจะกลับมาระดับเดิม
      let childIndent=null;
      for(let j=k+1;j<items.length;j++){
        if(items[j].indent<=parentIndent) break;
        if(!items[j].used){ childIndent=items[j].indent; break; }
      }
      let childHtml = (childIndent!==null) ? build(childIndent) : '';
      out+='<li>'+inline(n.text)+childHtml+'</li>';
    }
    if(open) out+='</'+(ordered?'ol':'ul')+'>';
    return out;
  }
  return build(baseIndent);
}

document.getElementById('content').innerHTML = render(MD);
</script>
</body>
</html>
