<style>
  :root{--bg:#0f172a;--paper:#111c33;--txt:#e6edf6;--muted:#9fb0c7;--accent:#38bdf8;--line:#2b3a52;--hl:#fcd34d}

<body>

<script>
const MD = "# 📖 อธิบาย 5 ขั้นตอนวางระบบ PDPA — พร้อมตัวอย่างจริงของอาจารย์\n### เดินเรื่องด้วยบริษัทตัวอย่างที่อาจารย์ใช้: **\"Coffee Concepts\"** (ร้านกาแฟ/ค้าปลีก)\n\u003e อ่านคู่กับ flowchart (ไฟล์ 06) — ไฟล์นี้ลงรายละเอียด \"ทำอะไร + ทำไม + ตัวอย่างที่อาจารย์โชว์\"\n\n---\n\n## สถานการณ์ตั้งต้น (ที่อาจารย์สมมติ)\nบริษัท **Coffee Concepts Retail** เปิดร้านกาแฟหลายสาขาในห้าง มีการเก็บข้อมูลลูกค้า (สมาชิก/สะสมคะแนน), ข้อมูลพนักงาน (HR), กล้องวงจรปิด, ขายออนไลน์ (E-Commerce) → ต้องทำให้ทั้งระบบเป็นไปตาม PDPA\n\n---\n\n## 1️⃣ ขั้นที่ 1 — ตั้งคณะทำงาน\n\n**อธิบาย:** PDPA มีศัพท์เฉพาะเยอะ (DC/DP/DS) และเกี่ยวพันหลายฝ่าย จะอบรมทั้งบริษัทพร้อมกันตั้งแต่แรกทำได้ยากและเปลืองทรัพยากร จึงต้องตั้ง **\"ทีมแกน\"** ขับเคลื่อนก่อน\n\n**ทีมต้องมีใคร:**\n- เจ้าหน้าที่คุ้มครองข้อมูล (**DPO**)\n- ฝ่ายกฎหมาย\n- ฝ่าย IT/ดิจิทัล\n- ผู้บริหารที่ออกนโยบายได้\n- **Champion** = ตัวแทนจากฝ่ายที่ใช้ข้อมูลจริง\n\n**ตัวอย่างของอาจารย์ — Champion ของ Coffee Concepts มาจากฝ่ายไหนบ้าง:**\n\u003e ฝ่ายทรัพยากรบุคคล (HR) · ฝ่ายการตลาด · ฝ่ายขาย · ฝ่ายลูกค้าสัมพันธ์/บริการหลังการขาย/Call Center · ฝ่ายธุรกิจดิจิทัล (E-Commerce)\n\n**ได้อะไร:** ทีมที่รู้ว่า \"ใครรับผิดชอบเรื่องข้อมูลในแต่ละมุมขององค์กร\"\n\n---\n\n## 2️⃣ ขั้นที่ 2 — อบรมพนักงาน\n\n**อธิบาย:** หลังตั้งทีมแล้ว ต้องให้ความรู้ก่อนลงมือสำรวจ มิฉะนั้นคนกรอกข้อมูลจะแยกไม่ออกว่าอะไรคือข้อมูลส่วนบุคคล\n\n**เนื้อหาที่ต้องอบรม:**\n- หลักการ PDPA + ศัพท์เฉพาะ (DC = ผู้ควบคุม, DP = ผู้ประมวลผล, DS = เจ้าของข้อมูล)\n- **แยกข้อมูลส่วนบุคคล ออกจากข้อมูลทั่วไป**\n- การใช้ข้อยกเว้นของกฎหมาย\n\n**ตัวอย่างของอาจารย์ (โจทย์ฝึกในห้อง):**\n\u003e พนักงาน Coffee Concepts ต้องตอบได้ว่า `recruitment-th@coffee-concepts.co.th` (อีเมลกลางแผนก) = **ข้อมูลทั่วไป** แต่ `somchai.j@coffee-concepts.co.th` (ชื่อพนักงาน) = **ข้อมูลส่วนบุคคล**\n\n**ได้อะไร:** ทุกฝ่ายเข้าใจตรงกัน พร้อมให้ข้อมูลที่ถูกต้องในขั้นถัดไป\n\n---\n\n## 3️⃣ ขั้นที่ 3 — สำรวจข้อมูล (PDPA Fact-Finding Questionnaire)\n\n**อธิบาย:** ส่งแบบสำรวจให้ **Champion แต่ละฝ่าย** กรอกว่าฝ่ายตน \"เก็บ/ใช้/เปิดเผย\" ข้อมูลอะไรบ้าง เพื่อให้ DPO เห็นภาพรวมการประมวลผลทั้งองค์กร\n\n**วิธีทำ:** แต่ละฝ่ายบันทึกกิจกรรมลงในรูปแบบ **ROPA (Record of Processing Activities)** ของฝ่ายตน → นำมารวมเป็น **ROPA ของบริษัท**\n\n**ตัวอย่างของอาจารย์ (ไฟล์จริงที่โชว์):**\n\u003e 📄 `Coffee Concepts - Record of Processing Activities_07.11.2025.xlsb` (ไฟล์ Excel ROPA ของบริษัท)\n\u003e\n\u003e ตัวอย่างรายการใน ROPA เช่น:\n\u003e | ฝ่าย | ข้อมูลที่เก็บ | วัตถุประสงค์ | ฐานกฎหมาย | ระยะเวลาเก็บ |\n\u003e |---|---|---|---|---|\n\u003e | HR | ชื่อ-สกุล, เลขบัตร ปชช., เงินเดือน | จ้างงาน/จ่ายเงินเดือน | สัญญา (ม.24(3)) | ตลอดอายุงาน+X ปี |\n\u003e | การตลาด | ชื่อ, อีเมล, พฤติกรรมซื้อ | ส่งโปรโมชั่น | ความยินยอม (ม.19) | จนกว่าถอนยินยอม |\n\u003e | ความปลอดภัย | ภาพ CCTV | ป้องกันเหตุ | ประโยชน์โดยชอบ (ม.24(5)) | 30 วัน |\n\n**ได้อะไร:** **ROPA** = บัญชีรายการว่าองค์กรมีข้อมูลอะไร เก็บทำไม อยู่ที่ไหน\n\n---\n\n## 4️⃣ ขั้นที่ 4 — Data Mapping \u0026 Gap Analysis\n\n**อธิบาย:** เอาข้อมูลจาก ROPA มาทำ **แผนผังการไหลของข้อมูล (Data Flow)** แล้ว **เทียบกับที่กฎหมายกำหนด** เพื่อหา \"ช่องว่าง\" (Gap) ว่าจุดไหนยังทำไม่ถูก\n\n**ตัวอย่างของอาจารย์ (ไฟล์จริงที่โชว์):**\n\u003e 📄 `Coffee Concepts Retail - List of Key Issues and Recommendations` = เอกสารสรุป \"ปัญหาที่พบ + ข้อเสนอแนะ\" จาก Gap Analysis\n\u003e\n\u003e ตัวอย่างช่องว่างที่มักเจอ:\n\u003e - ❌ ฝ่ายการตลาดส่งโปรโมชั่นโดย **ไม่เคยขอความยินยอม** → ต้องทำ Consent Form\n\u003e - ❌ ไม่มี **Privacy Notice** บนเว็บไซต์ → ต้องจัดทำ\n\u003e - ❌ เก็บสำเนาบัตร ปชช. ลูกค้าโดย **ไม่จำเป็น** → ต้องลด (Data Minimization)\n\u003e - ❌ ส่งข้อมูลให้บริษัท Outsource โดย **ไม่มีสัญญา DPA** → ต้องทำ\n\n**ได้อะไร:** รายการ \"สิ่งที่ต้องแก้\" ที่ชัดเจน\n\n---\n\n## 5️⃣ ขั้นที่ 5 — จัดทำเอกสาร/เครื่องมือปิดช่องว่าง\n\n**อธิบาย:** ลงมือสร้างเอกสาร/มาตรการเพื่อปิด Gap ที่เจอในขั้น 4\n\n**ชุดเอกสารที่อาจารย์ยกตัวอย่างจริง:**\n| เอกสาร | ตัวอย่างของอาจารย์ |\n|---|---|\n| **Privacy Notice** | หน้า Privacy Notice + Employee Privacy ของ **Starbucks** (เป็นตัวอย่างที่ดี) |\n| **Consent Form** | ช่องติ๊กยินยอมรับข่าวสารการตลาด ที่ **แยกออกจาก**เงื่อนไขการใช้บริการในหน้าสมัครสมาชิก |\n| **DSAR Form (คำร้องขอใช้สิทธิ)** | ฟอร์มของ Coffee Concepts — มีช่องระบุ \"ยื่นเอง/เป็นตัวแทน\" + แนบสำเนาบัตร ปชช./หนังสือมอบอำนาจ |\n| **DPA** | สัญญาตอนส่งข้อมูลให้ outsource (เช่น บริษัท Payroll) |\n| **ป้าย CCTV** | ป้ายของ Coffee Concepts Retail — ระบุผู้ควบคุมข้อมูล + วัตถุประสงค์ + **เก็บ 30 วัน** + QR code ไป Privacy Notice |\n| **ROPA + Retention Policy + แผนรับมือละเมิด + มาตรการ Security** | จัดทำตามที่ Gap Analysis ชี้ |\n\n**ได้อะไร:** องค์กร PDPA Compliant — ปิดช่องว่างครบ พร้อมรับการตรวจสอบ\n\n---\n\n## 🔁 หลังครบ 5 ขั้น\nไม่ใช่ทำครั้งเดียวจบ — ต้อง **ทบทวน/ปรับปรุงเป็นรอบ** (วนกลับไปสำรวจใหม่เมื่อมีกิจกรรม/เทคโนโลยีใหม่)\n\n## 🎯 มิติจริยธรรม\nทุกขั้นไม่ได้ทำเพื่อ \"กันโดนปรับ\" แต่เพื่อ **สร้างวัฒนธรรมเคารพข้อมูลของผู้อื่น** → ปลายทางคือ **ความไว้วางใจ (Trust)** ของลูกค้าและสังคม\n\n---\n### ⚡ สรุป 1 บรรทัดต่อขั้น (ท่องก่อนสอบ)\n1. **ตั้งทีม** (DPO+Champion) → 2. **อบรม** (เข้าใจ DC/DP/DS) → 3. **สำรวจ** (ได้ ROPA) → 4. **วิเคราะห์ช่องว่าง** (Gap Analysis) → 5. **ทำเอกสาร** (Privacy Notice/Consent/DPA/CCTV)\n";
const C0 = String.fromCharCode(1), C1 = String.fromCharCode(2);  // ตัวคั่นชั่วคราวสำหรับ inline code

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// จัดรูปแบบ inline: code, ลิงก์, ตัวหนา, ตัวเอียง  (rawHtml=true จะไม่ escape < >)
function inline(t, rawHtml){
  let s = rawHtml ? t : esc(t);
  const codes = [];
  s = s.replace(/`([^`]+)`/g, function(m,c){ codes.push(c); return C0+(codes.length-1)+C1; });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(new RegExp(C0+'(\\d+)'+C1,'g'), function(m,i){ return '<code>'+codes[i]+'</code>'; });
  return s;
}

function isTableSep(l){ return /^\s*\|?[\s:|-]+\|?\s*$/.test(l) && l.indexOf('-')>=0; }
function splitRow(l){
  let s = l.trim().replace(/^\|/,'').replace(/\|$/,'');
  return s.split('|').map(function(c){ return c.trim(); });
}

function render(md){
  const lines = md.replace(/\r\n?/g,'\n').split('\n');
  let html = '', i = 0, para = [];
  const flush = function(){ if(para.length){ html += '<p>'+para.map(function(x){return inline(x);}).join('<br>')+'</p>'; para=[]; } };

  while(i < lines.length){
    let l = lines[i];

    if(l.trim()===''){ flush(); i++; continue; }

    // โค้ดบล็อก
    if(/^`/.test(l.trim())){ flush(); let buf=[]; i++;
      while(i<lines.length && !/^`/.test(lines[i].trim())){ buf.push(lines[i]); i++; }
      i++; html += '<pre><code>'+esc(buf.join('\n'))+'</code></pre>'; continue; }

    // หัวข้อ
    let h = l.match(/^(#{1,6})\s+(.*)$/);
    if(h){ flush(); const n=h[1].length; html += '<h'+n+'>'+inline(h[2])+'</h'+n+'>'; i++; continue; }

    // เส้นคั่น (--- หรือ *** หรือ ___) บรรทัดที่มีแต่อักขระเหล่านี้
    if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(l)){ flush(); html+='<hr>'; i++; continue; }

    // ตาราง
    if(l.trim().indexOf('|')===0 && i+1<lines.length && isTableSep(lines[i+1])){
      flush();
      const head = splitRow(l); i += 2;
      let rows = [];
      while(i<lines.length && lines[i].trim().indexOf('|')===0){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+head.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>'; }
      html += t+'</tbody></table>'; continue;
    }

    // blockquote
    if(/^\s*>/.test(l)){ flush(); let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      html += '<blockquote>'+buf.map(function(x){return x.trim()===''?'':'<p>'+inline(x)+'</p>';}).join('')+'</blockquote>'; continue; }

    // รายการ (รองรับย่อยตามการเยื้อง)
    if(/^\s*([-*+]|\d+\.)\s+/.test(l)){ flush();
      const block=[];
      while(i<lines.length && (/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) || (lines[i].trim()!=='' && /^\s{2,}\S/.test(lines[i]) && block.length))){
        block.push(lines[i]); i++;
      }
      html += renderList(block); continue;
    }

    // HTML ดิบ (เช่น <details>)
    if(/^\s*</.test(l)){ flush(); html += inline(l, true); i++; continue; }

    para.push(l); i++;
  }
  flush();
  return html;
}

// แปลงรายการที่มีการเยื้องเป็น <ul>/<ol> ซ้อนได้
function renderList(block){
  const items = [];
  for(const raw of block){
    const m = raw.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
    if(m){
      items.push({ indent:m[1].length, ordered:/\d+\./.test(m[2]), text:m[3], used:false });
    } else if(items.length){
      items[items.length-1].text += '<br>'+inline(raw.trim());
    }
  }
  if(!items.length) return '';
  const baseIndent = Math.min.apply(null, items.map(function(n){return n.indent;}));
  function build(parentIndent){
    let out='', ordered=null, open=false;
    for(let k=0;k<items.length;k++){
      const n=items[k];
      if(n.used) continue;
      if(n.indent!==parentIndent) continue;
      n.used=true;
      if(!open){ ordered=n.ordered; out+='<'+(ordered?'ol':'ul')+'>'; open=true; }
      // หาลูก (ระดับเยื้องมากกว่า) ที่อยู่ถัดไปก่อนจะกลับมาระดับเดิม
      let childIndent=null;
      for(let j=k+1;j<items.length;j++){
        if(items[j].indent<=parentIndent) break;
        if(!items[j].used){ childIndent=items[j].indent; break; }
      }
      let childHtml = (childIndent!==null) ? build(childIndent) : '';
      out+='<li>'+inline(n.text)+childHtml+'</li>';
    }
    if(open) out+='</'+(ordered?'ol':'ul')+'>';
    return out;
  }
  return build(baseIndent);
}

document.getElementById('content').innerHTML = render(MD);
</script>
