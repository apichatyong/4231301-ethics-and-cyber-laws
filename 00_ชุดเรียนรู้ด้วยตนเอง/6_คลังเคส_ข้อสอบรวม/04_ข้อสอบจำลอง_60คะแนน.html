<style>
  :root{--bg:#0f172a;--paper:#111c33;--txt:#e6edf6;--muted:#9fb0c7;--accent:#38bdf8;--line:#2b3a52;--hl:#fcd34d}

<script>
const MD = "# 📝 ข้อสอบจำลองปลายภาค 60 คะแนน — 4231301\n### ⏱️ จับเวลา 3 ชั่วโมง | ปรนัย 30 ข้อ (40 คะแนน) + อัตนัย 4 ข้อ (20 คะแนน)\n\u003e ทำให้เสร็จก่อนเปิดไฟล์เฉลย (`05_เฉลย...`) — แนะนำทำวันที่ 26 มิ.ย.\n\n---\n## ส่วนที่ 1 — ปรนัย (เลือกคำตอบที่ถูกที่สุด)\n\n**1.** PDPA บังคับใช้เต็มรูปแบบเมื่อใด — ก.27 พ.ค.62 ข.1 มิ.ย.65 ค.1 ม.ค.63 ง.28 พ.ค.62\n\n**2.** ข้อใดเป็นข้อมูลส่วนบุคคลตาม ม.6 — ก.ข้อมูลบริษัท ข.ข้อมูลคนตาย ค.IP address ของบุคคล ง.ยอดขายรวม\n\n**3.** ฐานการประมวลผลของ CCTV คือ — ก.ความยินยอม ข.สัญญา ค.ประโยชน์โดยชอบด้วยกฎหมาย ง.ภารกิจรัฐ\n\n**4.** ข้อมูลใดเป็น Sensitive Data ตาม ม.26 — ก.เบอร์โทร ข.ข้อมูลสุขภาพ ค.ที่อยู่ ง.เลขบัญชี\n\n**5.** ต้องแจ้งเหตุละเมิดข้อมูลต่อ สคส. ภายใน — ก.24 ชม. ข.48 ชม. ค.72 ชม. ง.7 วัน\n\n**6.** สิทธิ Right to be forgotten อยู่มาตราใด — ก.ม.30 ข.ม.32 ค.ม.33 ง.ม.36\n\n**7.** มาตรการความปลอดภัยตาม PDPA ครอบคลุม — ก.CIA ข.AAA ค.PKI ง.DPO\n\n**8.** DP เมื่อพบเหตุละเมิดต้องแจ้งต่อ — ก.สคส. ข.DC ค.เจ้าของข้อมูล ง.ตำรวจ\n\n**9.** โทษทางปกครองสูงสุดของ PDPA — ก.1 ล้าน ข.3 ล้าน ค.5 ล้าน ง.10 ล้าน\n\n**10.** PDPA มีฐานการประมวลผลทั่วไปกี่ฐาน — ก.5 ข.6 ค.7 ง.8\n\n**11.** การแฮกเข้าระบบที่มีมาตรการป้องกันโดยมิชอบ ตรงกับ — ก.ม.5 ข.ม.7 ค.ม.10 ง.ม.14\n\n**12.** การโจมตี DDoS ตรงกับมาตราใดของ พ.ร.บ.คอม — ก.ม.7 ข.ม.10 ค.ม.13 ง.ม.16\n\n**13.** การโพสต์ข่าวปลอมกระทบความมั่นคง ตรงกับ — ก.ม.8 ข.ม.11 ค.ม.14 ง.ม.16\n\n**14.** ผู้ให้บริการเก็บ log อย่างน้อยกี่วัน — ก.30 ข.60 ค.90 ง.180\n\n**15.** ผู้ให้บริการพ้นผิดตาม ม.15 เมื่อ — ก.จ่ายค่าปรับ ข.ได้รับแจ้งเตือนแล้วนำข้อมูลออก ค.ปิดเว็บ ง.ไม่มีทางพ้น\n\n**16.** \"CII\" ตาม พ.ร.บ.ไซเบอร์ คือ — ก.ข้อมูลส่วนบุคคล ข.โครงสร้างพื้นฐานสำคัญทางสารสนเทศ ค.ลายเซ็นดิจิทัล ง.ผู้ให้บริการ\n\n**17.** หน่วยปฏิบัติหลักของ พ.ร.บ.ไซเบอร์ — ก.สคส. ข.สกมช. ค.ETDA ง.กสทช.\n\n**18.** ความรับผิดของผู้บริหารตาม พ.ร.บ.ไซเบอร์ อยู่มาตราใด — ก.ม.49 ข.ม.60 ค.ม.77 ง.ม.5\n\n**19.** ลิขสิทธิ์เกิดขึ้นเมื่อ — ก.จดทะเบียน ข.สร้างสรรค์งานเสร็จ ค.เผยแพร่ ง.ชำระค่าธรรมเนียม\n\n**20.** ซอฟต์แวร์ได้รับความคุ้มครองในฐานะงาน — ก.ศิลปกรรม ข.วรรณกรรม ค.สิทธิบัตร ง.ความลับการค้า\n\n**21.** อายุสิทธิบัตรการประดิษฐ์ — ก.10 ปี ข.20 ปี ค.50 ปี ง.6 ปี\n\n**22.** การ \"ปลอม\" เครื่องหมายการค้าที่จดแล้ว โทษสูงสุด — ก.1 ปี ข.2 ปี/2 แสน ค.4 ปี/4 แสน ง.5 พัน\n\n**23.** สูตรลับที่บริษัทเก็บไว้ คุ้มครองในฐานะ — ก.สิทธิบัตร ข.ลิขสิทธิ์ ค.ความลับทางการค้า ง.เครื่องหมายการค้า\n\n**24.** Social scoring จัดอยู่ความเสี่ยงระดับใดตาม EU AI Act — ก.ต่ำ ข.จำกัด ค.สูง ง.ต้องห้าม\n\n**25.** Chatbot คุยกับลูกค้า ต้องปฏิบัติตามข้อกำหนดใด — ก.ห้ามใช้ ข.แจ้งว่าเป็น AI ค.ขออนุญาตศาล ง.ไม่มีข้อกำหนด\n\n**26.** แนวจริยธรรม AI ของไทยออกโดย — ก.สคส. ข.ETDA ค.สกมช. ง.กสทช.\n\n**27.** กรณี COMPAS สะท้อนปัญหา AI ด้านใด — ก.ความเร็ว ข.อคติ/ความไม่เป็นธรรม ค.ต้นทุน ง.ความปลอดภัย\n\n**28.** หลักที่ถือว่าข้อมูลอิเล็กทรอนิกส์เทียบเท่ากระดาษ — ก.Party Autonomy ข.Functional Equivalence ค.Technological Neutrality ง.Proportionality\n\n**29.** หน่วยงานหลักด้านธุรกรรมอิเล็กทรอนิกส์ — ก.สคส. ข.ETDA ค.สกมช. ง.กสทช.\n\n**30.** ลายมือชื่ออิเล็กทรอนิกส์ที่น่าเชื่อถือสูงสุด — ก.พิมพ์ชื่อท้ายเมล ข.สแกนลายเซ็น ค.มีใบรับรองจาก CA ง.OTP เปล่า\n\n---\n## ส่วนที่ 2 — อัตนัย (ตอบตามโครง 4 ขั้น ข้อละ 5 คะแนน)\n\n**ข้อ 1 (PDPA):** บริษัทเก็บข้อมูลลูกค้าเพื่อจัดส่งสินค้า แต่นำไปขายต่อให้บริษัทโฆษณาโดยไม่แจ้ง จงวินิจฉัยตาม PDPA พร้อมระบุฐาน/มาตราและมิติจริยธรรม\n\n**ข้อ 2 (พ.ร.บ.คอม/ไซเบอร์):** พนักงานคนหนึ่งไม่พอใจบริษัท จึงปล่อย Ransomware ทำให้ระบบของโรงพยาบาล (CII) ล่ม ผู้ป่วยได้รับผลกระทบ จงวิเคราะห์ความผิดและหน้าที่ของหน่วยงานตามกฎหมายที่เกี่ยวข้อง\n\n**ข้อ 3 (IP):** นักศึกษาดาวน์โหลดซอฟต์แวร์เถื่อนมาใช้ทำธุรกิจ และก๊อปปี้แจกเพื่อน จงวินิจฉัยความผิดทางลิขสิทธิ์ พร้อมมิติจริยธรรม\n\n**ข้อ 4 (AI + ข้ามหัวข้อ):** บริษัทใช้ AI วิเคราะห์ข้อมูลสุขภาพจากโซเชียลของผู้สมัครงานเพื่อคัดเลือก จงวิเคราะห์ปัญหาตาม AI Ethics + PDPA + แง่จริยธรรม\n\n---\n*คะแนนเต็ม 60 | เกณฑ์ผ่านโดยทั่วไป ≥ 50% = 30 คะแนน — ตั้งเป้า ≥ 45 เพื่อความปลอดภัย*\n";
const C0 = String.fromCharCode(1), C1 = String.fromCharCode(2);  // ตัวคั่นชั่วคราวสำหรับ inline code

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// จัดรูปแบบ inline: code, ลิงก์, ตัวหนา, ตัวเอียง  (rawHtml=true จะไม่ escape < >)
function inline(t, rawHtml){
  let s = rawHtml ? t : esc(t);
  const codes = [];
  s = s.replace(/`([^`]+)`/g, function(m,c){ codes.push(c); return C0+(codes.length-1)+C1; });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(new RegExp(C0+'(\\d+)'+C1,'g'), function(m,i){ return '<code>'+codes[i]+'</code>'; });
  return s;
}

function isTableSep(l){ return /^\s*\|?[\s:|-]+\|?\s*$/.test(l) && l.indexOf('-')>=0; }
function splitRow(l){
  let s = l.trim().replace(/^\|/,'').replace(/\|$/,'');
  return s.split('|').map(function(c){ return c.trim(); });
}

function render(md){
  const lines = md.replace(/\r\n?/g,'\n').split('\n');
  let html = '', i = 0, para = [];
  const flush = function(){ if(para.length){ html += '<p>'+para.map(function(x){return inline(x);}).join('<br>')+'</p>'; para=[]; } };

  while(i < lines.length){
    let l = lines[i];

    if(l.trim()===''){ flush(); i++; continue; }

    // โค้ดบล็อก
    if(/^`/.test(l.trim())){ flush(); let buf=[]; i++;
      while(i<lines.length && !/^`/.test(lines[i].trim())){ buf.push(lines[i]); i++; }
      i++; html += '<pre><code>'+esc(buf.join('\n'))+'</code></pre>'; continue; }

    // หัวข้อ
    let h = l.match(/^(#{1,6})\s+(.*)$/);
    if(h){ flush(); const n=h[1].length; html += '<h'+n+'>'+inline(h[2])+'</h'+n+'>'; i++; continue; }

    // เส้นคั่น (--- หรือ *** หรือ ___) บรรทัดที่มีแต่อักขระเหล่านี้
    if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(l)){ flush(); html+='<hr>'; i++; continue; }

    // ตาราง
    if(l.trim().indexOf('|')===0 && i+1<lines.length && isTableSep(lines[i+1])){
      flush();
      const head = splitRow(l); i += 2;
      let rows = [];
      while(i<lines.length && lines[i].trim().indexOf('|')===0){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+head.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>'; }
      html += t+'</tbody></table>'; continue;
    }

    // blockquote
    if(/^\s*>/.test(l)){ flush(); let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      html += '<blockquote>'+buf.map(function(x){return x.trim()===''?'':'<p>'+inline(x)+'</p>';}).join('')+'</blockquote>'; continue; }

    // รายการ (รองรับย่อยตามการเยื้อง)
    if(/^\s*([-*+]|\d+\.)\s+/.test(l)){ flush();
      const block=[];
      while(i<lines.length && (/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) || (lines[i].trim()!=='' && /^\s{2,}\S/.test(lines[i]) && block.length))){
        block.push(lines[i]); i++;
      }
      html += renderList(block); continue;
    }

    // HTML ดิบ (เช่น <details>)
    if(/^\s*</.test(l)){ flush(); html += inline(l, true); i++; continue; }

    para.push(l); i++;
  }
  flush();
  return html;
}

// แปลงรายการที่มีการเยื้องเป็น <ul>/<ol> ซ้อนได้
function renderList(block){
  const items = [];
  for(const raw of block){
    const m = raw.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
    if(m){
      items.push({ indent:m[1].length, ordered:/\d+\./.test(m[2]), text:m[3], used:false });
    } else if(items.length){
      items[items.length-1].text += '<br>'+inline(raw.trim());
    }
  }
  if(!items.length) return '';
  const baseIndent = Math.min.apply(null, items.map(function(n){return n.indent;}));
  function build(parentIndent){
    let out='', ordered=null, open=false;
    for(let k=0;k<items.length;k++){
      const n=items[k];
      if(n.used) continue;
      if(n.indent!==parentIndent) continue;
      n.used=true;
      if(!open){ ordered=n.ordered; out+='<'+(ordered?'ol':'ul')+'>'; open=true; }
      // หาลูก (ระดับเยื้องมากกว่า) ที่อยู่ถัดไปก่อนจะกลับมาระดับเดิม
      let childIndent=null;
      for(let j=k+1;j<items.length;j++){
        if(items[j].indent<=parentIndent) break;
        if(!items[j].used){ childIndent=items[j].indent; break; }
      }
      let childHtml = (childIndent!==null) ? build(childIndent) : '';
      out+='<li>'+inline(n.text)+childHtml+'</li>';
    }
    if(open) out+='</'+(ordered?'ol':'ul')+'>';
    return out;
  }
  return build(baseIndent);
}

document.getElementById('content').innerHTML = render(MD);
</script>
