<script>
const MD = "# 📘 สรุปเนื้อหา: พ.ร.บ.คอมพิวเตอร์ + พ.ร.บ.ความมั่นคงปลอดภัยไซเบอร์\n### คาบ 4 | อ.รุ่งโรจน์ ดิษบรรจง | ทดสอบย่อย 5 คะแนน\n\n\u003e คาบนี้มี **2 กฎหมาย** ต้องแยกให้ชัด:\n\u003e - **พ.ร.บ.คอมพิวเตอร์ 2550/2560** = เน้น **\"ความผิด + โทษ\"** ของบุคคล (มาตรา 5–16)\n\u003e - **พ.ร.บ.ไซเบอร์ 2562** = เน้น **\"โครงสร้าง + หน้าที่\"** ในการป้องกันภัยระดับชาติ\n\n---\n# ส่วน A — พ.ร.บ.ว่าด้วยการกระทำความผิดเกี่ยวกับคอมพิวเตอร์\n\n| รายการ | ข้อมูล |\n|---|---|\n| ฉบับแรก | พ.ศ. **2550** (บังคับใช้ 18 ก.ค. 2550) |\n| แก้ไขเพิ่มเติม (ฉบับ 2) | พ.ศ. **2560** (บังคับใช้ 24 พ.ค. 2560) |\n| นิยามสำคัญ | **มาตรา 3** — ระบบคอมพิวเตอร์, ข้อมูลคอมพิวเตอร์, ข้อมูลจราจรทางคอมพิวเตอร์, ผู้ให้บริการ |\n\n## 🏛️ บริบทยุคสมัย \u0026 ผู้ออกกฎหมาย (อาจารย์เน้น)\n\n| รายการ | ฉบับแรก 2550 | ฉบับที่ 2 (2560) |\n|---|---|---|\n| **ยุค/บริบท** | หลัง**รัฐประหาร 19 ก.ย. 2549** (โค่นรัฐบาลทักษิณ) ยุค **คมช.** | หลัง**รัฐประหาร 2557** ยุค **คสช.** |\n| **รัฐบาล (นายกฯ)** | **พล.อ. สุรยุทธ์ จุลานนท์** | **พล.อ. ประยุทธ์ จันทร์โอชา** |\n| **ผู้ตรากฎหมาย** | **สภานิติบัญญัติแห่งชาติ (สนช.)** — สภา**แต่งตั้ง** | **สนช.** (แต่งตั้งเหมือนเดิม) |\n| **ลงพระปรมาภิไธย** | **ในหลวง รัชกาลที่ 9** | ในหลวง รัชกาลที่ 10 |\n| **บังคับใช้** | 18 ก.ค. 2550 | 24 พ.ค. 2560 |\n\n\u003e 💡 **แพตเทิร์นจำง่าย:** พ.ร.บ.คอม **ทั้ง 2 ฉบับ คลอดจากสภาแต่งตั้ง (สนช.) ในยุคหลังรัฐประหาร** (2550 = หลัง รปห.49 / 2560 = หลัง รปห.57)\n\u003e ⚖️ **เหตุผลที่ต้องออกปี 2550:** ตอนนั้นไทย**ยังไม่มีกฎหมายเอาผิดอาชญากรรมคอมพิวเตอร์โดยตรง** (แฮก/เจาะระบบเอาผิดยาก) จึงต้องมีกฎหมายเฉพาะ\n\n## ⭐ ฐานความผิดและโทษ (จำตารางนี้ = หัวใจการสอบ)\n\n| มาตรา | ความผิด | โทษสูงสุด |\n|---|---|---|\n| **ม.5** | เข้าถึง **ระบบ** คอมพิวเตอร์ที่มีมาตรการป้องกันโดยมิชอบ | จำคุก ≤ 6 เดือน / ปรับ ≤ 10,000 |\n| **ม.6** | ล่วงรู้ **มาตรการป้องกัน** แล้วนำไปเปิดเผย | จำคุก ≤ 1 ปี / ปรับ ≤ 20,000 |\n| **ม.7** | เข้าถึง **ข้อมูล** คอมพิวเตอร์โดยมิชอบ | จำคุก ≤ 2 ปี / ปรับ ≤ 40,000 |\n| **ม.8** | **ดักรับ** ข้อมูลระหว่างส่งโดยมิชอบ | จำคุก ≤ 3 ปี / ปรับ ≤ 60,000 |\n| **ม.9** | **แก้ไข/ทำลาย/เปลี่ยนแปลง** ข้อมูลผู้อื่นโดยมิชอบ | จำคุก ≤ 5 ปี / ปรับ ≤ 100,000 |\n| **ม.10** | **รบกวน/ขัดขวางระบบ** จนทำงานไม่ปกติ (เช่น DoS) | จำคุก ≤ 5 ปี / ปรับ ≤ 100,000 |\n| **ม.11** | **สแปม** — ส่งข้อมูล/อีเมลปกปิดแหล่งที่มา รบกวนผู้รับ | ปรับ ≤ 100,000 (รบกวนรำคาญ ≤ 200,000) |\n| **ม.12** | **เหตุฉกรรจ์/เพิ่มโทษ ของ ม.9 + ม.10** (ดูตาราง 3 ชั้นด้านล่าง) | สูงสุด **จำคุก 5–20 ปี / ปรับ ถึง 400,000** |\n| **ม.13** | จำหน่าย/เผยแพร่ **ชุดคำสั่ง (มัลแวร์)** เพื่อใช้กระทำผิด | จำคุก ≤ 1 ปี (เพื่อ ม.12 → ≤ 2 ปี) |\n| **ม.14** | นำเข้า **ข้อมูลเท็จ/ปลอม/ลามก** กระทบบุคคล ฉ้อโกง ความมั่นคง ตื่นตระหนก | จำคุก ≤ 5 ปี / ปรับ ≤ 100,000 |\n| **ม.15** | **ผู้ให้บริการ (ตัวกลาง)** ยินยอม/รู้เห็นกับความผิด ม.14 | รับโทษเท่าผู้โพสต์ (ดูข้อยกเว้น) |\n| **ม.16** | นำเข้า **ภาพตัดต่อ/ดัดแปลง** ทำให้ผู้อื่นเสียชื่อเสียง/อับอาย | จำคุก ≤ 3 ปี / ปรับ ≤ 200,000 |\n\n## 🔥 เจาะ ม.12 — เหตุฉกรรจ์/เพิ่มโทษ (3 ชั้น)\n\n\u003e **ม.12 ไม่ใช่ฐานความผิดใหม่** แต่เป็นการ **ยกระดับโทษของ ม.9 (แก้ไข/ทำลายข้อมูล) และ ม.10 (รบกวนระบบ/DoS)** เมื่อผลร้ายแรงขึ้น — เกาะอยู่กับ 2 มาตรานี้เท่านั้น\n\n| ชั้น | เงื่อนไข | โทษ |\n|---|---|---|\n| **ม.12(1)** | ทำผิด ม.9/ม.10 แล้ว **ก่อความเสียหายแก่ประชาชน** (เกิดทันทีหรือภายหลังก็ได้) | **จำคุก ≤ 10 ปี + ปรับ ≤ 200,000** |\n| **ม.12(2)** | กระทบ **ความมั่นคงของประเทศ / ความปลอดภัยสาธารณะ / เศรษฐกิจของประเทศ / โครงสร้างพื้นฐานสาธารณะ (CII)** | **จำคุก 3–15 ปี + ปรับ 60,000–300,000** |\n| **ม.12 วรรคท้าย** | ทำผิดตาม **(2) แล้วเป็นเหตุให้ผู้อื่นถึงแก่ความตาย** | **จำคุก 5–20 ปี + ปรับ 100,000–400,000** ⬅️ โทษสูงสุดของทั้ง พ.ร.บ. |\n\n**🔑 จุดสำคัญ:**\n- ไล่ความรุนแรงเป็นขั้น: เสียหายต่อประชาชน (≤10 ปี) → กระทบมั่นคง/CII (3–15 ปี) → ถึงตาย (5–20 ปี)\n- ชั้น (2) และวรรคท้ายมี **โทษขั้นต่ำ** (3 ปี / 5 ปี) ต่างจากมาตราอื่นที่ระบุแค่ \"ไม่เกิน\" → กฎหมายมองว่าร้ายแรงมาก\n- \"โครงสร้างพื้นฐานสาธารณะ\" ใน ม.12(2) = แนวคิดเดียวกับ **CII (ม.49 พ.ร.บ.ไซเบอร์)** เช่น ไฟฟ้า ประปา การเงิน สาธารณสุข คมนาคม\n\n**📝 ตัวอย่างเทียบ (ข้อสอบชอบออก):**\n- แฮกแก้ไขเว็บเอกชนทั่วไป → **ม.9** (≤5 ปี)\n- DoS ถล่มจน**ระบบจ่ายไฟ/โรงพยาบาลล่ม** → **ม.12(2)** (3–15 ปี)\n- เหตุนั้นทำให้**คนไข้ ICU เสียชีวิต** → **ม.12 วรรคท้าย** (5–20 ปี)\n\n---\n\n## 📕 เจาะ ม.14 — นำข้อมูลเท็จ/ผิดกฎหมายเข้าระบบ (5 อนุมาตรา)\n\n\u003e โทษหลัก: **จำคุก ≤ 5 ปี / ปรับ ≤ 100,000 / หรือทั้งจำทั้งปรับ**\n\n| อนุ | การกระทำ | คำสำคัญ |\n|---|---|---|\n| **(1)** | **โดยทุจริต/หลอกลวง** นำเข้าข้อมูล **เท็จ/บิดเบือน/ปลอม** ที่น่าเสียหายแก่ประชาชน | **\"อันมิใช่หมิ่นประมาทตามประมวลอาญา\"** ⬅️ จุดแก้ปี 2560 |\n| **(2)** | นำเข้าข้อมูล **เท็จ** กระทบ **ความมั่นคง/ความปลอดภัยสาธารณะ/เศรษฐกิจ/โครงสร้างพื้นฐาน** หรือทำ **ประชาชนตื่นตระหนก** | ข่าวปลอมสร้างแพนิก |\n| **(3)** | นำเข้าข้อมูลอันเป็นความผิดเกี่ยวกับ **ความมั่นคงแห่งราชอาณาจักร / ก่อการร้าย** | โยงประมวลอาญา |\n| **(4)** | นำเข้าข้อมูลลักษณะ **ลามก** ที่ **ประชาชนทั่วไปเข้าถึงได้** | ต้อง \"เข้าถึงได้ทั่วไป\" |\n| **(5)** | **เผยแพร่/ส่งต่อ (แชร์)** ข้อมูลตาม (1)–(4) **โดยรู้อยู่แล้ว** | ⭐ แชร์ก็ผิด! |\n\n**🔑 จุดเน้น:**\n\n1. **การแก้ปี 2560 — กัน ม.14 ไม่ให้ใช้ฟ้องหมิ่นประมาท**\n   \u003e เดิม (2550) ม.14(1) ถูกนำไปฟ้องคดีหมิ่นประมาทออนไลน์เกลื่อน → ปี 2560 เติม **\"โดยทุจริต/หลอกลวง\"** + **\"อันมิใช่การหมิ่นประมาทตามประมวลอาญา\"**\n   \u003e ⚠️ **กับดัก:** ด่า/ใส่ร้ายรายบุคคลออนไลน์ = **หมิ่นประมาท (ประมวลอาญา ม.326/328)** ไม่ใช่ ม.14 — ม.14 ใช้กับ **ข้อมูลเท็จที่หลอกลวงเป็นวงกว้าง** (ข่าวปลอม/สแกม)\n\n2. **อนุ (5) แชร์/ส่งต่อโดยรู้ = ผิดเท่าคนโพสต์** (ไม่ใช่แค่คนต้นทาง)\n\n3. **วรรคสอง — กรณีทำต่อ \"บุคคลคนเดียว\" (ไม่ใช่ประชาชน):**\n\n| กรณี | โทษ | ยอมความ |\n|---|---|---|\n| ทำผิด (1) ต่อ **ประชาชนทั่วไป** | ≤ 5 ปี / ≤ 100,000 | ❌ ยอมความไม่ได้ |\n| ทำผิด (1) ต่อ **บุคคลใดบุคคลหนึ่ง** | **≤ 3 ปี / ≤ 60,000** | ✅ **ยอมความได้** |\n\n**📝 ตัวอย่างเทียบ (จำแนกให้ถูกอนุ):**\n- ข่าวปลอม \"ธนาคารจะล้ม รีบถอนเงิน\" จนคนแห่ถอน → **ม.14(2)** (ตื่นตระหนก/เศรษฐกิจ)\n- เว็บปลอมหลอกให้โอนเงิน (สแกม) → **ม.14(1)** (ทุจริต/หลอกลวง)\n- โพสต์คลิปลามกให้คนทั่วไปดูได้ → **ม.14(4)**\n- แชร์ข่าวปลอมต่อทั้งที่รู้ว่าปลอม → **ม.14(5)**\n- โพสต์ด่า \"นาย ก. โกงเงิน\" (ใส่ร้ายรายบุคคล) → **หมิ่นประมาท** ไม่ใช่ ม.14\n\n---\n\n## ⚖️ กล่องเทียบ: ดูหมิ่น vs หมิ่นประมาท vs ม.14 (กันพลาดข้อสอบ)\n\n\u003e ทั้ง \"ดูหมิ่น\" และ \"หมิ่นประมาท\" อยู่ใน **ประมวลกฎหมายอาญา** (ไม่ใช่ พ.ร.บ.คอม)\n\n| ประเด็น | **ดูหมิ่น** | **หมิ่นประมาท** | **ม.14 พ.ร.บ.คอม** |\n|---|---|---|---|\n| **มาตรา** | อาญา **ม.393** | อาญา **ม.326 / ม.328 (โฆษณา)** | พ.ร.บ.คอม **ม.14** |\n| **ลักษณะ** | คำ **ด่า/เหยียด** ไม่มีเนื้อเรื่อง | **\"ใส่ความ\"** เล่าเรื่องที่ทำเสียชื่อเสียง | **ข้อมูลเท็จ/หลอกลวง** เป็นวงกว้าง |\n| **บุคคลที่สาม** | ❌ ไม่ต้อง (ซึ่งหน้าก็ผิด) | ✅ ต้องมี | — (กระทบประชาชน) |\n| **โทษ** | ≤ 1 เดือน / ≤ 10,000 | ม.326 ≤1 ปี · **ม.328 ≤2 ปี/≤200,000** | ≤ 5 ปี / ≤ 100,000 |\n| **พิสูจน์ว่าจริงแล้วรอด** | ❌ | ✅ ม.330 (จริง+ประโยชน์สาธารณะ) | — |\n\n**🔑 วิธีจำ:**\n- **ดูหมิ่น = \"ด่า\"** (ไอ้โง่/อีเลว — พิสูจน์จริง-เท็จไม่ได้)\n- **หมิ่นประมาท = \"ใส่ความ\"** (นาย ก. ยักยอกเงิน — พิสูจน์ได้)\n- **ม.14 = \"ข่าวปลอม/สแกม\"** หลอกประชาชนเป็นวงกว้าง\n\n\u003e 💡 **ทดสอบเร็ว:** ตัดประโยคออกมาแล้ว \"พิสูจน์ว่าจริงหรือเท็จได้ไหม\" → ได้ = **หมิ่นประมาท** / ไม่ได้ (แค่คำด่า) = **ดูหมิ่น**\n\u003e ⚠️ **ด่า/ใส่ร้ายรายบุคคลทางออนไลน์ = ม.328 (หมิ่นประมาทโดยโฆษณา) ไม่ใช่ ม.14** — เพราะปี 2560 แก้ว่า ม.14 \"อันมิใช่การหมิ่นประมาท\"\n\n---\n\n## 🖼️ เจาะ ม.16 — ภาพตัดต่อทำให้เสียหาย (รวม deepfake)\n\n\u003e **โทษหลัก (วรรคหนึ่ง): จำคุก ≤ 3 ปี *และ* ปรับ ≤ 200,000** — สังเกตคำว่า **\"และ\"** (ลงโทษได้ทั้งจำทั้งปรับพร้อมกัน)\n\n**องค์ประกอบความผิด (ต้องครบทุกข้อ):**\n\n| # | องค์ประกอบ | จุดต้องจับ |\n|---|---|---|\n| 1 | นำเข้าสู่ระบบที่ **ประชาชนทั่วไปเข้าถึงได้** | โพสต์สาธารณะ (ไม่ใช่ส่งส่วนตัวคนเดียว) |\n| 2 | เป็น **ภาพของผู้อื่น** | ต้องเป็น \"ภาพ\" |\n| 3 | ภาพนั้น **สร้างขึ้น/ตัดต่อ/เติม/ดัดแปลง** | ⭐ หัวใจ — ภาพที่ถูกทำขึ้น ไม่ใช่ภาพจริง |\n| 4 | น่าจะทำให้ **เสียชื่อเสียง/ถูกดูหมิ่น/ถูกเกลียดชัง/อับอาย** | องค์ประกอบเดียวกับหมิ่นประมาท |\n\n**🔑 จุดออกสอบ:**\n1. **วรรคสอง — ภาพของ \"ผู้ตาย\"** ที่น่าจะทำให้ **บิดา/มารดา/คู่สมรส/บุตร** เสียชื่อเสียง/อับอาย → ผิด โทษเท่าวรรคหนึ่ง (ครอบครัวเป็นผู้เสียหายแทน)\n2. **วรรคสาม — ข้อยกเว้น:** ทำโดย **สุจริต เป็นการติชมด้วยความเป็นธรรม** ตามวิสัยประชาชน → **ไม่มีความผิด** (เช่น ภาพล้อ/เสียดสีเชิงวิจารณ์โดยสุจริต)\n3. **เป็นความผิดอันยอมความได้** (ผู้เสียหายตายก่อนร้องทุกข์ → ครอบครัวร้องทุกข์แทนได้)\n\n**⚠️ กับดัก — แยก ม.16 จากมาตราใกล้เคียง:**\n\n| สถานการณ์ | มาตรา |\n|---|---|\n| เอา **ภาพตัดต่อ** ทำให้อับอาย | **ม.16** ✅ |\n| เอา **ภาพจริง** (ไม่ตัดต่อ) มาประจาน | ❌ ไม่ใช่ ม.16 → **หมิ่นประมาท ม.328** |\n| ภาพ/คลิป **ลามก** เข้าถึงทั่วไป | **ม.14(4)** |\n| **ด่าด้วยข้อความ** ใส่ร้าย | **หมิ่นประมาท ม.328** |\n\n\u003e 💡 **คีย์เวิร์ดชี้ ม.16 = \"ตัดต่อ/ดัดแปลงภาพ\"** ถ้าไม่มีการตัดต่อภาพ → ไม่ใช่ ม.16\n\u003e 🆕 **deepfake** (สร้างใบหน้า/วิดีโอปลอม) ทำให้เสียชื่อเสียง = เข้า ม.16 เต็ม ๆ\n\n**📝 ตัวอย่าง:**\n- ตัดต่อหัวเพื่อนไปต่อภาพโป๊แล้วโพสต์ → **ม.16** (+ อาจ ม.14(4) ถ้าลามก)\n- เอารูปจริงตอนเมาของเพื่อนมาประจาน → **ม.328** (ภาพจริง ไม่ใช่ ม.16)\n- ทำมีมล้อนักการเมืองเชิงวิจารณ์โดยสุจริต → **ยกเว้นวรรคสาม ไม่ผิด**\n\n---\n\n\u003e 💡 **ม.14 (ข่าวปลอม/หมิ่นประมาทออนไลน์)** และ **ม.15 (ผู้ให้บริการ)** เป็นมาตราที่ออกสอบบ่อยที่สุด\n\u003e **ม.15:** ถ้าผู้ให้บริการได้รับแจ้งเตือนแล้ว **นำข้อมูลออก (notice \u0026 takedown)** → **ไม่ต้องรับโทษ**\n\u003e **การ \"แชร์/ส่งต่อ\"** ข้อมูลผิด ม.14 โดยรู้อยู่แล้ว = มีความผิดด้วย\n\n## 🌏 เจาะ ม.17 — ลงโทษการกระทำผิด \"นอกราชอาณาจักร\" (Extraterritorial Jurisdiction) ⭐ออกสอบแน่\n\n\u003e **เหตุผล:** อาชญากรรมคอมพิวเตอร์ **ไร้พรมแดน** — แฮกเกอร์อยู่ต่างประเทศแต่โจมตีเหยื่อในไทยได้ กฎหมายจึงตามไปลงโทษในไทยได้\n\n**เงื่อนไข 2 กรณี (ต้องมี \"คำร้องขอให้ลงโทษ\" เสมอ):**\n\n| กรณี | ผู้กระทำ | เงื่อนไขเพิ่ม |\n|---|---|---|\n| **ม.17(1)** | **คนไทย** | **รัฐที่เกิดเหตุ** หรือ **ผู้เสียหาย** ร้องขอให้ลงโทษ |\n| **ม.17(2)** | **คนต่างด้าว** | **รัฐบาลไทย หรือ คนไทย เป็นผู้เสียหาย** + ผู้เสียหายร้องขอให้ลงโทษ |\n\n\u003e 🔑 **หัวใจ:**\n\u003e - ทั้ง 2 กรณี **ต้องมีการ \"ร้องขอให้ลงโทษ\"** เสมอ (ไม่ร้องขอ = ลงโทษในไทยไม่ได้)\n\u003e - กรณี (1) ดูที่ **สัญชาติผู้กระทำ (คนไทย)** / กรณี (2) ดูที่ **ผู้เสียหายเป็นไทย/รัฐไทย**\n\u003e - หลักกฎหมาย: **personality principle** (สัญชาติคนไทย) + **protective/passive principle** (คุ้มครองคนไทย/รัฐไทย)\n\n## อำนาจพนักงานเจ้าหน้าที่ \u0026 เขตอำนาจ\n- **ม.17/1** — คณะกรรมการ **เปรียบเทียบปรับ** คดีเล็กน้อย (ชำระแล้วคดีอาญาเลิกกัน)\n- **ม.18(1)–(3)** — อำนาจ **ไม่ต้องขอหมายศาล**: เรียกบุคคลให้ถ้อยคำ/ส่งเอกสาร, เรียกข้อมูลจราจร, สั่งผู้ให้บริการส่งข้อมูล (ผู้รับคำสั่งต้องทำใน 7–15 วัน)\n- **ม.18(4)–(8) + ม.19** — อำนาจ **ต้องขอศาล**: ทำสำเนา/สั่งส่งมอบ/เข้าถึงระบบ/ถอดรหัส/ยึด-อายัด; รายงานศาลภายใน **48 ชั่วโมง**; ยึด/อายัด ≤ 30 วัน (ขยายสูงสุด 60 วัน)\n- **ม.20** — การ **ระงับ/ลบข้อมูล** ที่ผิดกฎหมายชัดเจนหรือขัดศีลธรรม ต้องผ่านความเห็นชอบ + **ยื่นคำร้องต่อศาล**\n- **ม.21** — ห้ามจำหน่าย/เผยแพร่ **ชุดคำสั่งไม่พึงประสงค์ (มัลแวร์)**\n- **ม.22–24 (ความรับผิดของเจ้าหน้าที่เอง)** — เปิดเผยข้อมูลโดยเจตนา (ม.22) จำคุก ≤3 ปี/ปรับ ≤60,000 · ประมาทเลินเล่อ (ม.23) ≤1 ปี/≤20,000 · บุคคลภายนอกรู้แล้วเปิดเผย (ม.24) ≤2 ปี/≤40,000\n- **ม.25** — การรับฟัง **พยานหลักฐานดิจิทัล** (ที่ได้มาโดยมิชอบอาจรับฟังไม่ได้)\n- **ม.26** — ผู้ให้บริการต้องเก็บ **ข้อมูลจราจร (log) ไม่น้อยกว่า 90 วัน** (สั่งขยายได้สูงสุด 2 ปี); ฝ่าฝืน **ปรับไม่เกิน 500,000 บาท**\n- **ม.27** — ขัดคำสั่งศาล/พนักงานเจ้าหน้าที่ → **ปรับไม่เกิน 200,000 บาท + ปรับรายวัน ≤ 5,000 บาท/วัน**\n\n---\n# ส่วน B — พ.ร.บ.การรักษาความมั่นคงปลอดภัยไซเบอร์ พ.ศ. 2562\n\n| รายการ | ข้อมูล |\n|---|---|\n| ประกาศ / บังคับใช้ | 27 พ.ค. 2562 / **28 พ.ค. 2562** |\n| แนวคิด | เปลี่ยน \"ความปลอดภัยไซเบอร์\" จากเรื่องเทคนิค → เป็น **หน้าที่ตามกฎหมาย** ของหน่วยงานและผู้บริหาร |\n\n## ⭐ นิยามสำคัญ (3 ตัว)\n- **ภัยคุกคามทางไซเบอร์ (มาตรา 3)** — การกระทำที่มิชอบต่อระบบ/ข้อมูล ที่อาจก่อความเสียหาย\n- **CII — โครงสร้างพื้นฐานสำคัญทางสารสนเทศ (มาตรา 49)** — ระบบของบริการสำคัญ เช่น ไฟฟ้า ประปา การเงิน สาธารณสุข คมนาคม\n- **ระดับความรุนแรงของภัย (มาตรา 60) — 3 ระดับ:** ① ไม่ร้ายแรง ② ร้ายแรง ③ วิกฤติ\n\n## ⭐ โครงสร้างองค์กร (The National Ecosystem) — จำลำดับ\n**กมช. (นโยบาย ม.5) → กกท. (กำกับดูแล ม.12) → สกมช. (สำนักงาน=ปฏิบัติ) → หน่วยงาน CII (ปฏิบัติจริง)**\n- **กมช.** = คณะกรรมการการรักษาความมั่นคงปลอดภัยไซเบอร์แห่งชาติ (นายกฯ เป็นประธาน) — กำหนดนโยบายระดับชาติ\n- **กกท.** = คณะกรรมการกำกับดูแลด้านความมั่นคงปลอดภัยไซเบอร์\n- **สกมช.** = สำนักงานคณะกรรมการการรักษาความมั่นคงปลอดภัยไซเบอร์แห่งชาติ (หน่วยปฏิบัติ)\n\n## หน้าที่และการรับมือ\n- **มุมกฎหมาย:** หน้าที่และความรับผิด (ม.44–46) — หน่วยงาน CII ต้องมีมาตรการ ประเมินความเสี่ยง แจ้งเหตุ\n- **มุมเทคนิค:** Log · Monitoring · Incident Response · Backup · Access Control\n- **กระบวนการรับมือเหตุ (Incident Response):** ตรวจพบ → ตรวจสอบ → ประเมิน → รับมือ → รายงาน\n- **วงจรความมั่นคงไซเบอร์ (Cycle of Resilience):** Identify → Protect → Detect → Respond → Recover\n- **โทษ (ม.70–76)** เช่น เข้าถึง CII โดยมิชอบ จำคุก ≤ 2 ปี/ปรับ ≤ 60,000\n- **ความรับผิดของผู้บริหาร (ม.77)** — หากนิติบุคคลทำผิดจากการสั่งการ/ละเว้นของผู้บริหาร ผู้บริหารต้องรับผิดด้วย (Executive Liability)\n\n---\n## 🎯 มิติจริยธรรม (สำหรับอัตนัย)\n- **พ.ร.บ.คอม** ตั้งอยู่บนหลัก: เคารพสิทธิผู้อื่น · เคารพความเป็นส่วนตัว · รักษาความถูกต้องของข้อมูล (Integrity) · ใช้เสรีภาพอย่างรับผิดชอบ · ไม่ก่อความเสียหาย (Non-Maleficence)\n- **พ.ร.บ.ไซเบอร์** เพิ่ม: ความมั่นคงของส่วนรวม (Collective Security) · บริหารความเสี่ยงร่วมกัน · ใช้อำนาจรัฐอย่างได้สัดส่วน (Proportionality) · ความโปร่งใสตรวจสอบได้\n- ประโยคสรุป: *\"ใช้เทคโนโลยีต้องเคารพสิทธิผู้อื่น รับผิดชอบต่อสังคม รักษาความมั่นคงของข้อมูล/ระบบ และคำนึงถึงประโยชน์ส่วนรวมควบคู่กับการคุ้มครองสิทธิเสรีภาพ\"*\n\n## ⚠️ อย่าสับสน 3 หน่วยงาน\n- **สคส. (PDPC)** = PDPA (ข้อมูลส่วนบุคคล)\n- **สกมช.** = พ.ร.บ.ไซเบอร์ (ความมั่นคงไซเบอร์)\n- **ETDA (สพธอ.)** = ธุรกรรมอิเล็กทรอนิกส์\n";
const C0 = String.fromCharCode(1), C1 = String.fromCharCode(2);  // ตัวคั่นชั่วคราวสำหรับ inline code

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// จัดรูปแบบ inline: code, ลิงก์, ตัวหนา, ตัวเอียง  (rawHtml=true จะไม่ escape < >)
function inline(t, rawHtml){
  let s = rawHtml ? t : esc(t);
  const codes = [];
  s = s.replace(/`([^`]+)`/g, function(m,c){ codes.push(c); return C0+(codes.length-1)+C1; });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(new RegExp(C0+'(\\d+)'+C1,'g'), function(m,i){ return '<code>'+codes[i]+'</code>'; });
  return s;
}

function isTableSep(l){ return /^\s*\|?[\s:|-]+\|?\s*$/.test(l) && l.indexOf('-')>=0; }
function splitRow(l){
  let s = l.trim().replace(/^\|/,'').replace(/\|$/,'');
  return s.split('|').map(function(c){ return c.trim(); });
}

function render(md){
  const lines = md.replace(/\r\n?/g,'\n').split('\n');
  let html = '', i = 0, para = [];
  const flush = function(){ if(para.length){ html += '<p>'+para.map(function(x){return inline(x);}).join('<br>')+'</p>'; para=[]; } };

  while(i < lines.length){
    let l = lines[i];

    if(l.trim()===''){ flush(); i++; continue; }

    // โค้ดบล็อก
    if(/^`/.test(l.trim())){ flush(); let buf=[]; i++;
      while(i<lines.length && !/^`/.test(lines[i].trim())){ buf.push(lines[i]); i++; }
      i++; html += '<pre><code>'+esc(buf.join('\n'))+'</code></pre>'; continue; }

    // หัวข้อ
    let h = l.match(/^(#{1,6})\s+(.*)$/);
    if(h){ flush(); const n=h[1].length; html += '<h'+n+'>'+inline(h[2])+'</h'+n+'>'; i++; continue; }

    // เส้นคั่น (--- หรือ *** หรือ ___) บรรทัดที่มีแต่อักขระเหล่านี้
    if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(l)){ flush(); html+='<hr>'; i++; continue; }

    // ตาราง
    if(l.trim().indexOf('|')===0 && i+1<lines.length && isTableSep(lines[i+1])){
      flush();
      const head = splitRow(l); i += 2;
      let rows = [];
      while(i<lines.length && lines[i].trim().indexOf('|')===0){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+head.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>'; }
      html += t+'</tbody></table>'; continue;
    }

    // blockquote
    if(/^\s*>/.test(l)){ flush(); let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      html += '<blockquote>'+buf.map(function(x){return x.trim()===''?'':'<p>'+inline(x)+'</p>';}).join('')+'</blockquote>'; continue; }

    // รายการ (รองรับย่อยตามการเยื้อง)
    if(/^\s*([-*+]|\d+\.)\s+/.test(l)){ flush();
      const block=[];
      while(i<lines.length && (/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) || (lines[i].trim()!=='' && /^\s{2,}\S/.test(lines[i]) && block.length))){
        block.push(lines[i]); i++;
      }
      html += renderList(block); continue;
    }

    // HTML ดิบ (เช่น <details>)
    if(/^\s*</.test(l)){ flush(); html += inline(l, true); i++; continue; }

    para.push(l); i++;
  }
  flush();
  return html;
}

// แปลงรายการที่มีการเยื้องเป็น <ul>/<ol> ซ้อนได้
function renderList(block){
  const items = [];
  for(const raw of block){
    const m = raw.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
    if(m){
      items.push({ indent:m[1].length, ordered:/\d+\./.test(m[2]), text:m[3], used:false });
    } else if(items.length){
      items[items.length-1].text += '<br>'+inline(raw.trim());
    }
  }
  if(!items.length) return '';
  const baseIndent = Math.min.apply(null, items.map(function(n){return n.indent;}));
  function build(parentIndent){
    let out='', ordered=null, open=false;
    for(let k=0;k<items.length;k++){
      const n=items[k];
      if(n.used) continue;
      if(n.indent!==parentIndent) continue;
      n.used=true;
      if(!open){ ordered=n.ordered; out+='<'+(ordered?'ol':'ul')+'>'; open=true; }
      // หาลูก (ระดับเยื้องมากกว่า) ที่อยู่ถัดไปก่อนจะกลับมาระดับเดิม
      let childIndent=null;
      for(let j=k+1;j<items.length;j++){
        if(items[j].indent<=parentIndent) break;
        if(!items[j].used){ childIndent=items[j].indent; break; }
      }
      let childHtml = (childIndent!==null) ? build(childIndent) : '';
      out+='<li>'+inline(n.text)+childHtml+'</li>';
    }
    if(open) out+='</'+(ordered?'ol':'ul')+'>';
    return out;
  }
  return build(baseIndent);
}

document.getElementById('content').innerHTML = render(MD);
