<title>📘 สรุปเนื้อหา: กฎหมายว่าด้วยธุรกรรมทางอิเล็กทรอนิกส์</title>
<style>
  :root{--bg:#0f172a;--paper:#111c33;--txt:#e6edf6;--muted:#9fb0c7;--accent:#38bdf8;--line:#2b3a52;--hl:#fcd34d}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:"Sarabun","Segoe UI",Tahoma,sans-serif;line-height:1.75}
  .topnav{position:sticky;top:0;background:#0b1322ee;backdrop-filter:blur(6px);border-bottom:1px solid var(--line);
          padding:10px 16px;display:flex;gap:14px;align-items:center;z-index:50;font-size:14px}
  .topnav a{color:var(--muted);text-decoration:none;padding:5px 11px;border:1px solid var(--line);border-radius:999px}
  .topnav a:hover{color:var(--accent);border-color:var(--accent)}
  main{max-width:860px;margin:0 auto;padding:30px 22px 80px}
  h1,h2,h3,h4{line-height:1.35;margin:1.5em 0 .6em;font-weight:700}
  h1{font-size:27px;border-bottom:2px solid var(--accent);padding-bottom:.3em;margin-top:.3em}
  h2{font-size:22px;color:#bfe6fb;border-bottom:1px solid var(--line);padding-bottom:.25em}
  h3{font-size:18px;color:#a7d8f0}

       font-family:"Cascadia Code",Consolas,monospace}
  pre{background:#0b1322;border:1px solid var(--line);border-radius:10px;padding:14px 16px;overflow:auto}
  pre code{border:none;padding:0;background:none}
  a{color:var(--accent)}
  ul,ol{margin:.5em 0 .9em;padding-left:1.6em}
  li{margin:.3em 0}
  ul ul,ol ol,ul ol,ol ul{margin:.2em 0}
  blockquote{margin:1em 0;padding:.6em 1em;border-left:4px solid var(--accent);background:#0b132288;border-radius:0 8px 8px 0;color:#cdd9e8}
  blockquote p{margin:.3em 0}
  hr{border:none;border-top:1px dashed var(--line);margin:1.8em 0}
  table{border-collapse:collapse;width:100%;margin:1em 0;font-size:15px;display:block;overflow-x:auto}
  th,td{border:1px solid var(--line);padding:9px 12px;text-align:left;vertical-align:top}

  ::selection{background:#38bdf855}

<body>
  <div class="topnav">
    <a href="../หน้าแรก.html">🏠 หน้าแรก</a>

    <a href="javascript:window.print()">🖨️ พิมพ์/บันทึก PDF</a>
  </div>
  <main id="content"></main>

<script>
const MD = "# 📘 สรุปเนื้อหา: กฎหมายว่าด้วยธุรกรรมทางอิเล็กทรอนิกส์\n### คาบ 7 | อ.กชพร สุสันหกนก | ทดสอบย่อย 5 คะแนน (เรียนเช้าวันสอบ)\n\n\u003e เป้าหมายกฎหมาย = ทำให้ **ธุรกรรมอิเล็กทรอนิกส์มีผลทางกฎหมายเทียบเท่ากระดาษ** เพื่อรองรับเศรษฐกิจดิจิทัล\n\n---\n\n## 0. กฎหมายหลักที่ต้องจำ\n\n| กฎหมาย | ปี | สาระ |\n|---|---|---|\n| **พ.ร.บ.ว่าด้วยธุรกรรมทางอิเล็กทรอนิกส์** | **พ.ศ. 2544** (แก้ไข 2551, 2562) | กฎหมายแม่บท รับรองสถานะข้อมูลอิเล็กทรอนิกส์ |\n| **พ.ร.บ.สำนักงานพัฒนาธุรกรรมทางอิเล็กทรอนิกส์ (ETDA)** | พ.ศ. 2562 | ตั้ง สพธอ. |\n| **พ.ร.ก.ว่าด้วยการประชุมผ่านสื่ออิเล็กทรอนิกส์** | พ.ศ. 2563 | รองรับการประชุมออนไลน์ |\n\n**กฎหมายต้นแบบสากล (UNCITRAL):**\n- **UNCITRAL Model Law on Electronic Commerce (1996)**\n- **UNCITRAL Model Law on Electronic Signatures (2001)**\n\n**หน่วยงาน:** สำนักงานพัฒนาธุรกรรมทางอิเล็กทรอนิกส์ (**ETDA/สพธอ.**) + **คณะกรรมการธุรกรรมทางอิเล็กทรอนิกส์**\n\n---\n\n## 1. ⭐ 3 หลักการพื้นฐาน (หัวใจของวิชา — ออกสอบแน่)\n\n1. **หลักความเท่าเทียมกันทางกฎหมาย (Functional Equivalence)**\n   → \"กระดาษ\" กับ \"ข้อมูลอิเล็กทรอนิกส์\" มีผลทางกฎหมาย **เทียบเท่ากัน** — ห้ามปฏิเสธผลทางกฎหมายเพียงเพราะอยู่ในรูปข้อมูลอิเล็กทรอนิกส์\n2. **หลักความเป็นกลางทางเทคโนโลยี (Technological Neutrality)**\n   → กฎหมายไม่ผูกกับเทคโนโลยีใดเฉพาะ รองรับเทคโนโลยีในอนาคต\n3. **หลักเสรีภาพในการแสดงเจตนาของคู่สัญญา (Party Autonomy)**\n   → คู่สัญญาตกลงกันเองได้ (กฎหมายเป็นกฎเสริม)\n\n---\n\n## 2. สาระสำคัญ (5 องค์ประกอบที่กฎหมายรับรอง)\n\n| แนวคิด | มาตรา | หลักการ |\n|---|:---:|---|\n| **E-Document** (ข้อมูล/ข้อความอิเล็กทรอนิกส์) | ม.7–8 | มีผลผูกพันและใช้บังคับได้ ห้ามปฏิเสธเพราะอยู่ในรูปอิเล็กทรอนิกส์; ถือเป็น \"หนังสือ\" ถ้าเข้าถึงและนำกลับมาใช้ได้ |\n| **E-Signature** (ลายมือชื่ออิเล็กทรอนิกส์) | **ม.9 / ม.26** | ม.9 = ลายมือชื่อทั่วไป; ม.26 = ลายมือชื่อที่เชื่อถือได้ |\n| **E-Original** (ต้นฉบับ) | **ม.10** | ถือเป็นต้นฉบับได้ ถ้า (1) ครบถ้วน (Integrity) (2) แสดงข้อความได้ (Accessibility) |\n| **E-Evidence** (พยานหลักฐาน) | **ม.11** | **ห้ามปฏิเสธการรับฟัง** เพียงเพราะเป็นข้อมูลอิเล็กทรอนิกส์ (น้ำหนักดูจากความน่าเชื่อถือของวิธีสร้าง/เก็บ/ระบุตัวผู้ส่ง) |\n| **E-Archive** (จัดเก็บ) | **ม.12** | เก็บโดยความหมายคงเดิม + รูปแบบถูกต้อง + ระบุแหล่งที่มา (Audit Trail) |\n| **E-Offer / E-Acceptance** (คำเสนอ–คำสนอง) | **ม.13** | สัญญาออนไลน์มีผลผูกพันทันที; รวมระบบอัตโนมัติ (Smart Contract) |\n| **E-Expression of Intent / E-Notice** | **ม.14** | จุดที่ \"ส่งแล้ว (Sent)\" และ \"ได้รับแล้ว (Received)\" |\n\n---\n\n## 3. ⭐ ประเภทของลายมือชื่ออิเล็กทรอนิกส์ (3 ประเภท)\n\n| ประเภท | มาตรา | ลักษณะ | ตัวอย่างเทคโนโลยี |\n|---|:---:|---|---|\n| **1. ลายมือชื่อทั่วไป** (General) | **ม.9** | ระบุตัวตน+แสดงเจตนา วิธีน่าเชื่อถือเหมาะกับงาน เช่น พิมพ์ชื่อท้ายอีเมล, สแกนลายเซ็น | ภาพลายเซ็น, ชื่อท้ายเมล |\n| **2. ลายมือชื่อที่เชื่อถือได้** (Secure/Reliable) | **ม.26** | เชื่อมโยงเฉพาะตัว (Non-repudiation) + ตรวจจับการเปลี่ยนแปลงได้ | **PKI**, OTP, Digital Signature |\n| **3. ลายมือชื่อที่เชื่อถือได้ + ใบรับรอง** (Certified) | **ม.26** | เพิ่มใบรับรองจากผู้ให้บริการออกใบรับรอง (**CA**) | Digital Certificate |\n\n---\n\n## 4. ขอบเขตและบริบท\n\n- **ขอบเขต:** ธุรกรรมทางแพ่งและพาณิชย์ + ธุรกรรมภาครัฐ (คำขอ/อนุญาต/จดทะเบียน/ชำระเงิน)\n- **ข้อยกเว้น:** ธุรกรรมบางประเภทที่กฎหมายกำหนด (เช่น เรื่องครอบครัว/มรดก อาจมีข้อจำกัด)\n- **บริบทดิจิทัล:** Digital Transformation, Big Data, AI, Cryptocurrency/Digital Asset, FinTech\n- **ภัยไซเบอร์ที่เกี่ยวข้อง:** Unauthorized Access, Data Interception, Phishing, Online Impersonation, Cyberbullying ฯลฯ (เชื่อมกับ พ.ร.บ.คอมพิวเตอร์)\n\n---\n\n## 5. 🎯 มิติจริยธรรม (สำหรับอัตนัย)\n- จริยธรรม = สร้าง **ความน่าเชื่อถือ/ความไว้วางใจ (Trust)** ในการทำธุรกรรมออนไลน์ — ถ้าคนไม่เชื่อว่าสัญญา/ลายเซ็นอิเล็กทรอนิกส์มีผล เศรษฐกิจดิจิทัลก็โตไม่ได้\n- หลัก Functional Equivalence สะท้อนความเป็นธรรม — ไม่เลือกปฏิบัติระหว่างกระดาษกับดิจิทัล\n- ความซื่อสัตย์/ความถูกต้องของข้อมูล (Integrity) เป็นรากฐานของ E-Original และ E-Evidence\n";
const C0 = String.fromCharCode(1), C1 = String.fromCharCode(2);  // ตัวคั่นชั่วคราวสำหรับ inline code

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// จัดรูปแบบ inline: code, ลิงก์, ตัวหนา, ตัวเอียง  (rawHtml=true จะไม่ escape < >)
function inline(t, rawHtml){
  let s = rawHtml ? t : esc(t);
  const codes = [];
  s = s.replace(/`([^`]+)`/g, function(m,c){ codes.push(c); return C0+(codes.length-1)+C1; });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(new RegExp(C0+'(\\d+)'+C1,'g'), function(m,i){ return '<code>'+codes[i]+'</code>'; });
  return s;
}

function isTableSep(l){ return /^\s*\|?[\s:|-]+\|?\s*$/.test(l) && l.indexOf('-')>=0; }
function splitRow(l){
  let s = l.trim().replace(/^\|/,'').replace(/\|$/,'');
  return s.split('|').map(function(c){ return c.trim(); });
}

function render(md){
  const lines = md.replace(/\r\n?/g,'\n').split('\n');
  let html = '', i = 0, para = [];
  const flush = function(){ if(para.length){ html += '<p>'+para.map(function(x){return inline(x);}).join('<br>')+'</p>'; para=[]; } };

  while(i < lines.length){
    let l = lines[i];

    if(l.trim()===''){ flush(); i++; continue; }

    // โค้ดบล็อก
    if(/^`/.test(l.trim())){ flush(); let buf=[]; i++;
      while(i<lines.length && !/^`/.test(lines[i].trim())){ buf.push(lines[i]); i++; }
      i++; html += '<pre><code>'+esc(buf.join('\n'))+'</code></pre>'; continue; }

    // หัวข้อ
    let h = l.match(/^(#{1,6})\s+(.*)$/);
    if(h){ flush(); const n=h[1].length; html += '<h'+n+'>'+inline(h[2])+'</h'+n+'>'; i++; continue; }

    // เส้นคั่น (--- หรือ *** หรือ ___) บรรทัดที่มีแต่อักขระเหล่านี้
    if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(l)){ flush(); html+='<hr>'; i++; continue; }

    // ตาราง
    if(l.trim().indexOf('|')===0 && i+1<lines.length && isTableSep(lines[i+1])){
      flush();
      const head = splitRow(l); i += 2;
      let rows = [];
      while(i<lines.length && lines[i].trim().indexOf('|')===0){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+head.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>'; }
      html += t+'</tbody></table>'; continue;
    }

    // blockquote
    if(/^\s*>/.test(l)){ flush(); let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      html += '<blockquote>'+buf.map(function(x){return x.trim()===''?'':'<p>'+inline(x)+'</p>';}).join('')+'</blockquote>'; continue; }

    // รายการ (รองรับย่อยตามการเยื้อง)
    if(/^\s*([-*+]|\d+\.)\s+/.test(l)){ flush();
      const block=[];
      while(i<lines.length && (/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) || (lines[i].trim()!=='' && /^\s{2,}\S/.test(lines[i]) && block.length))){
        block.push(lines[i]); i++;
      }
      html += renderList(block); continue;
    }

    // HTML ดิบ (เช่น <details>)
    if(/^\s*</.test(l)){ flush(); html += inline(l, true); i++; continue; }

    para.push(l); i++;
  }
  flush();
  return html;
}

// แปลงรายการที่มีการเยื้องเป็น <ul>/<ol> ซ้อนได้
function renderList(block){
  const items = [];
  for(const raw of block){
    const m = raw.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
    if(m){
      items.push({ indent:m[1].length, ordered:/\d+\./.test(m[2]), text:m[3], used:false });
    } else if(items.length){
      items[items.length-1].text += '<br>'+inline(raw.trim());
    }
  }
  if(!items.length) return '';
  const baseIndent = Math.min.apply(null, items.map(function(n){return n.indent;}));
  function build(parentIndent){
    let out='', ordered=null, open=false;
    for(let k=0;k<items.length;k++){
      const n=items[k];
      if(n.used) continue;
      if(n.indent!==parentIndent) continue;
      n.used=true;
      if(!open){ ordered=n.ordered; out+='<'+(ordered?'ol':'ul')+'>'; open=true; }
      // หาลูก (ระดับเยื้องมากกว่า) ที่อยู่ถัดไปก่อนจะกลับมาระดับเดิม
      let childIndent=null;
      for(let j=k+1;j<items.length;j++){
        if(items[j].indent<=parentIndent) break;
        if(!items[j].used){ childIndent=items[j].indent; break; }
      }
      let childHtml = (childIndent!==null) ? build(childIndent) : '';
      out+='<li>'+inline(n.text)+childHtml+'</li>';
    }
    if(open) out+='</'+(ordered?'ol':'ul')+'>';
    return out;
  }
  return build(baseIndent);
}

document.getElementById('content').innerHTML = render(MD);
</script>
