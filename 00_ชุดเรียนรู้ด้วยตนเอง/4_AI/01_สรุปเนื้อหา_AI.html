<script>
const MD = "# 📘 สรุปเนื้อหา: กฎหมายว่าด้วยปัญญาประดิษฐ์ (AI Law \u0026 Ethics)\n### คาบ 6 | อ.ณัฐ์วารุตม์ เต็มพร้อม | ทดสอบย่อย 5 คะแนน\n\n\u003e ธีม: **EU AI Act ↔ หลักจริยธรรม AI ของ ETDA ↔ ร่าง พรฎ.ไทย ↔ PDPA**\n\u003e วิชานี้ยังไม่มีกฎหมาย AI ไทยที่บังคับใช้เต็มตัว — ไทยมีแค่ **\"ร่าง\"** พระราชกฤษฎีกา\n\n---\n\n## 🔴 จุดที่อาจารย์ทำสีแดง/ตีกรอบในสไลด์ = ออกสอบแน่\n\n\u003e อ.ณัฐ์วารุตม์ ทำ **สีแดง** และ **ตีกรอบแดง** จุดเหล่านี้ในสไลด์ ให้เน้นจำเป็นพิเศษ\n\n1. **(สไลด์ 2) Generative AI ไม่ได้มีแค่ LLM** — ยังมีโมเดลอีกหลายแบบ:\n   text→image / text→video / image→image / text→audio / text→music / text→3D / text→game / **text→robot action**\n2. **(สไลด์ 4) AI-Enhanced Automation** — ถ้านำ **AI builder / Copilot / cognitive services** ไปฝังใน automation\n   → *เฉพาะส่วนประกอบที่เป็น AI นั้น* จะตกอยู่ภายใต้การกำกับของ **AI Act** (Automation ล้วนๆ ไม่อยู่ใต้ AI Act)\n3. **(สไลด์ 16) ชื่อเต็มกฎหมายไทย** ที่ต้องเขียนให้ถูก:\n   **\"ร่างพระราชกฤษฎีกาการประกอบธุรกิจบริการที่ใช้งานระบบปัญญาประดิษฐ์ พ.ศ. ....\"** (โดย สดช. / คกก.ดิจิทัลฯ)\n4. **(สไลด์ 17) Social scoring ที่ \"ต้องห้าม\"** = ปฏิบัติต่อคนแบบ **detrimentally or unfavorably** (เป็นผลร้าย/ไม่เป็นคุณ)\n   อย่างไม่เป็นธรรมหรือไม่ได้สัดส่วนกับพฤติกรรมและความร้ายแรงของพฤติกรรมนั้น\n5. **(สไลด์ 20) ตัวอย่างนโยบายบริษัท** — ต้องปฏิบัติตามข้อกำหนด **high-risk** ตามที่ **the EU AI Act** กำหนด\n   (เคสเด่น: รับสมัคร/บริหารพนักงาน, ประเมินเครดิต, ประเมินความเสี่ยง+กำหนดเบี้ยประกันชีวิต/สุขภาพ)\n6. **(สไลด์ 24–25, กล่องแดง) ⭐ ตัวอย่างจัดประเภทความเสี่ยง Microsoft Cognitive Services / Azure AI Services** — ออกสอบรูปแบบ \"ใช้บริการนี้ จัดอยู่ระดับไหน\":\n\n| การใช้งาน | ระดับความเสี่ยง | ต้องทำอะไร |\n|---|---|---|\n| **Vision API** ทำระบบรักษาความปลอดภัย / **Language API** กรอง resume สมัครงาน | **High Risk** | data logging, human oversight, **ลงทะเบียนในฐานข้อมูล EU** |\n| ใช้ทำ **social scoring** / biometric mass surveillance | **Prohibited** | **ห้ามใช้เด็ดขาด** ใน EU |\n| ใช้ทำ **chatbot** คุยกับลูกค้า | **Limited Risk** | **ต้องเปิดเผยว่าลูกค้ากำลังคุยกับ AI** |\n\n---\n\n## 0. ภาพรวมที่ต้องจำ\n\n| ประเด็น | สาระ |\n|---|---|\n| **Generative AI** | AI ที่ **สร้างเนื้อหาใหม่** (ข้อความ/รูป/วิดีโอ/เสียง) ต่างจาก AI เดิมที่เน้นค้นหา/วิเคราะห์/จำแนก |\n| กฎหมาย AI ของ EU | **EU AI Act** (ใช้แนวทาง Risk-based) |\n| กฎหมาย AI ของไทย | **ร่าง** พรฎ.การประกอบธุรกิจบริการที่ใช้ระบบ AI (โดย สดช./คกก.ดิจิทัลฯ) — ยังเป็นร่าง |\n| แนวจริยธรรม AI ไทย | **ETDA AI Ethics Principles (6 ข้อ)** |\n| ปัญหาหลักของ AI | Hallucination, Black Box, Algorithmic Bias, ความเป็นส่วนตัว, ละเมิด IP |\n\n---\n\n## 1. EU AI Act — 6 หลักการสำคัญ\n\n1. **Human-centric** — AI เสี่ยงสูงต้องมี **มนุษย์ควบคุม** (human oversight)\n2. **Transparency** — โปร่งใส มีเอกสารทางเทคนิค เปิดเผย training data (แก้ปัญหา Black Box)\n3. **Accountability** — กำหนดความรับผิดของ provider และ deployer\n4. **Safety \u0026 Security** — มาตรการ cybersecurity, ป้องกัน AI jailbreaking\n5. **Data Governance** — มาตรฐานสูงในการกำกับข้อมูลที่ใช้ train/operate AI\n6. **Risk-based Regulation** — กำกับตามสัดส่วนความเสี่ยง (proportional oversight)\n\n---\n\n## 2. ⭐ EU AI Act — 4 ระดับความเสี่ยง (ออกสอบแน่)\n\n| ระดับ | ความหมาย | ตัวอย่าง use case | ข้อกำหนด |\n|---|---|---|---|\n| **1. ต้องห้าม** Prohibited / Unacceptable | ห้ามใช้เด็ดขาด | Social scoring, manipulation จิตใต้สำนึก, emotion recognition ในที่ทำงาน/โรงเรียน, biometric categorization แยกเชื้อชาติ/ศาสนา, real-time remote biometric ในที่สาธารณะ (เพื่อบังคับกฎหมาย), scrape ใบหน้าจากอินเทอร์เน็ต/CCTV | **ห้าม** |\n| **2. ความเสี่ยงสูง** High Risk | ใช้ได้แต่ต้องคุมเข้ม | โครงสร้างพื้นฐานสำคัญ, การศึกษา/สอบ, การจ้างงาน/คัดเลือกพนักงาน, การบังคับกฎหมาย, ตรวจคนเข้าเมือง, ประเมินเครดิต/ประกัน | Transparency, Human oversight, **Risk Management System**, Accountability, Security |\n| **3. ความเสี่ยงจำกัด** Limited Risk | ปฏิบัติเรื่องโปร่งใสเท่านั้น | **Chatbot, Deepfake** | ต้อง **แจ้งผู้ใช้ว่ากำลังคุยกับ AI / เนื้อหาสร้างโดย AI** |\n| **4. ความเสี่ยงต่ำ** Minimal Risk | ไม่ต้องปฏิบัติตามข้อกำหนด | เกม, spam filter, recommendation engine | สมัครใจใช้จรรยาบรรณ |\n\n\u003e EU AI Act ยังกำกับเพิ่ม: (1) **AI-enabled products** (อุปกรณ์ที่ฝัง AI เช่นการบิน) (2) **General-Purpose AI (GPAI)** / frontier models\n\u003e **ร่าง พรฎ.ไทย** นำเฉพาะ risk-based by use case มาใช้ แต่ **ยังไม่นำ** หลักเกณฑ์ AI-enabled products และ GPAI มาบังคับเหมือน EU\n\n---\n\n## 3. ⭐ ETDA — 6 หลักจริยธรรม AI ของไทย\n\n1. **Competitiveness \u0026 Sustainability** — สร้างประโยชน์ยั่งยืน (รวมถึง Green energy ของ Data Center; ไม่ให้ทุนใหญ่ผูกขาดบีบ SMEs)\n2. **Laws, Ethics \u0026 International Standards** — เคารพความเป็นส่วนตัว/สิทธิมนุษยชน (ปัญหา: Deepfake, mass surveillance, facial recognition, algorithmic bias)\n3. **Transparency \u0026 Accountability** — อธิบายได้ + สืบย้อนกลับได้ (Traceability) แก้ปัญหา Black Box / Hallucination\n4. **Security \u0026 Privacy** — มนุษย์ต้องแทรกแซง/ปิดระบบได้; ไม่สร้างอาวุธอัตโนมัติ\n5. **Fairness / Diversity** — ลดอคติ ไม่เลือกปฏิบัติ\n6. **Reliability** — แม่นยำ น่าเชื่อถือ ทำซ้ำได้ มีช่องทาง feedback\n\n**เคสจริงที่ใช้สอบอัตนัยได้:**\n- **COMPAS** (ศาลสหรัฐ) — อคติทางเชื้อชาติ ตัดสินคนผิวดำเสี่ยงทำผิดซ้ำสูงกว่า → ละเมิดหลัก Fairness\n- **Amazon Rekognition / Google Photos** — จดจำใบหน้าผิดพลาดกับคนผิวสี/ผู้หญิง\n- **Microsoft Tay Chatbot** — ถูกสอนให้โพสต์ข้อความเหยียด ปิดใน 16 ชม.\n- **China Social Credit System** — ตัวอย่าง social scoring (ต้องห้ามใน EU)\n\n---\n\n## 4. AI กับ PDPA / GDPR (จุดเชื่อมข้ามวิชา)\n\n- **GDPR Article 22** — ห้ามการตัดสินใจอัตโนมัติล้วนที่กระทบบุคคลอย่างมีนัยสำคัญ; ร่าง พรฎ.ไทยใช้หลัก \"ประมวลผลตามวัตถุประสงค์ที่แจ้ง\" (Privacy Notice + สิทธิเข้าถึง/แก้ไข) แทน\n- **ความเสี่ยง AI ต่อข้อมูลส่วนบุคคล:**\n  1. **Re-identification / Deanonymization** — AI ทำข้อมูลนิรนามกลับมาระบุตัวได้\n  2. **Sensitive Trait Inference** — AI เดาข้อมูลอ่อนไหว (สุขภาพ/การเมือง/เพศ) ตาม **PDPA ม.26** ด้วยเทคนิค model inversion/confidence-based attacks\n  3. **Model Memorization \u0026 Data Leakage** — Generative AI จำและ reproduce ข้อมูลส่วนบุคคลจาก training data (เช่น กรณี ChatGPT/Grok leaks)\n- **มาตรา 11 (ร่าง/EU)** — กำหนดให้มี **การควบคุมดูแลโดยมนุษย์** (human oversight)\n\n### ตารางเทียบ EU AI Act ↔ ร่าง พรฎ.ไทย ↔ PDPA (สไลด์ 26)\n\n| ประเด็น | EU AI Act | ร่าง พรฎ.ไทย | PDPA |\n|---|---|---|---|\n| ขอบเขต | AI ทุกระบบ (มี/ไม่มีข้อมูลส่วนบุคคลก็บังคับ) | AI ทุกระบบ | เฉพาะการ **ประมวลผลข้อมูลส่วนบุคคล** |\n| กรอบความเสี่ยง | **4 ระดับ** | 4 ระดับ (ตาม EU) | **ไม่บังคับ** ประเมิน/จัดระดับความเสี่ยง |\n| กำกับใคร | provider, deployer, distributor/importer | เหมือน EU | **DC และ DP** |\n| Human Oversight | high risk ต้องมี (**Art. 14**) | **ม.11** (รายละเอียดโดย ETDA) | ไม่มีข้อห้ามแบบ **GDPR Art. 22** |\n| บทลงโทษ | สูงสุด **EUR 35 ล้าน หรือ 7% ของรายได้ทั้งโลก** | กำหนดโดย คกก.ธุรกรรมอิเล็กทรอนิกส์ | ปกครองปรับ **ไม่เกิน 5 ล้านบาท** |\n| นอกประเทศ (Extraterritorial) | ใช้กับ AI ที่ใช้/ทำตลาดใน EU (คล้าย พรบ.คอมฯ) | ใช้กับการใช้ AI ในไทย | ใช้กับการประมวลผลข้อมูลคนที่อยู่ในไทย |\n\n---\n\n## 5. 🎯 มิติจริยธรรม AI (สำหรับอัตนัย)\n- หัวใจ = **\"Human-centric\"** — AI ต้องรับใช้มนุษย์ มนุษย์ต้องควบคุม/ปิดได้ ไม่ให้ AI กำหนดชะตาชีวิตคน\n- สมดุลระหว่าง **นวัตกรรม/การแข่งขัน** กับ **สิทธิมนุษยชน/ความเป็นธรรม**\n- กำกับตาม **สัดส่วนความเสี่ยง** — ยิ่งกระทบคนมาก ยิ่งคุมเข้ม (เหมือนหลัก Proportionality)\n";
const C0 = String.fromCharCode(1), C1 = String.fromCharCode(2);  // ตัวคั่นชั่วคราวสำหรับ inline code

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// จัดรูปแบบ inline: code, ลิงก์, ตัวหนา, ตัวเอียง  (rawHtml=true จะไม่ escape < >)
function inline(t, rawHtml){
  let s = rawHtml ? t : esc(t);
  const codes = [];
  s = s.replace(/`([^`]+)`/g, function(m,c){ codes.push(c); return C0+(codes.length-1)+C1; });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(new RegExp(C0+'(\\d+)'+C1,'g'), function(m,i){ return '<code>'+codes[i]+'</code>'; });
  return s;
}

function isTableSep(l){ return /^\s*\|?[\s:|-]+\|?\s*$/.test(l) && l.indexOf('-')>=0; }
function splitRow(l){
  let s = l.trim().replace(/^\|/,'').replace(/\|$/,'');
  return s.split('|').map(function(c){ return c.trim(); });
}

function render(md){
  const lines = md.replace(/\r\n?/g,'\n').split('\n');
  let html = '', i = 0, para = [];
  const flush = function(){ if(para.length){ html += '<p>'+para.map(function(x){return inline(x);}).join('<br>')+'</p>'; para=[]; } };

  while(i < lines.length){
    let l = lines[i];

    if(l.trim()===''){ flush(); i++; continue; }

    // โค้ดบล็อก
    if(/^`/.test(l.trim())){ flush(); let buf=[]; i++;
      while(i<lines.length && !/^`/.test(lines[i].trim())){ buf.push(lines[i]); i++; }
      i++; html += '<pre><code>'+esc(buf.join('\n'))+'</code></pre>'; continue; }

    // หัวข้อ
    let h = l.match(/^(#{1,6})\s+(.*)$/);
    if(h){ flush(); const n=h[1].length; html += '<h'+n+'>'+inline(h[2])+'</h'+n+'>'; i++; continue; }

    // เส้นคั่น (--- หรือ *** หรือ ___) บรรทัดที่มีแต่อักขระเหล่านี้
    if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(l)){ flush(); html+='<hr>'; i++; continue; }

    // ตาราง
    if(l.trim().indexOf('|')===0 && i+1<lines.length && isTableSep(lines[i+1])){
      flush();
      const head = splitRow(l); i += 2;
      let rows = [];
      while(i<lines.length && lines[i].trim().indexOf('|')===0){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+head.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>'; }
      html += t+'</tbody></table>'; continue;
    }

    // blockquote
    if(/^\s*>/.test(l)){ flush(); let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      html += '<blockquote>'+buf.map(function(x){return x.trim()===''?'':'<p>'+inline(x)+'</p>';}).join('')+'</blockquote>'; continue; }

    // รายการ (รองรับย่อยตามการเยื้อง)
    if(/^\s*([-*+]|\d+\.)\s+/.test(l)){ flush();
      const block=[];
      while(i<lines.length && (/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) || (lines[i].trim()!=='' && /^\s{2,}\S/.test(lines[i]) && block.length))){
        block.push(lines[i]); i++;
      }
      html += renderList(block); continue;
    }

    // HTML ดิบ (เช่น <details>)
    if(/^\s*</.test(l)){ flush(); html += inline(l, true); i++; continue; }

    para.push(l); i++;
  }
  flush();
  return html;
}

// แปลงรายการที่มีการเยื้องเป็น <ul>/<ol> ซ้อนได้
function renderList(block){
  const items = [];
  for(const raw of block){
    const m = raw.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
    if(m){
      items.push({ indent:m[1].length, ordered:/\d+\./.test(m[2]), text:m[3], used:false });
    } else if(items.length){
      items[items.length-1].text += '<br>'+inline(raw.trim());
    }
  }
  if(!items.length) return '';
  const baseIndent = Math.min.apply(null, items.map(function(n){return n.indent;}));
  function build(parentIndent){
    let out='', ordered=null, open=false;
    for(let k=0;k<items.length;k++){
      const n=items[k];
      if(n.used) continue;
      if(n.indent!==parentIndent) continue;
      n.used=true;
      if(!open){ ordered=n.ordered; out+='<'+(ordered?'ol':'ul')+'>'; open=true; }
      // หาลูก (ระดับเยื้องมากกว่า) ที่อยู่ถัดไปก่อนจะกลับมาระดับเดิม
      let childIndent=null;
      for(let j=k+1;j<items.length;j++){
        if(items[j].indent<=parentIndent) break;
        if(!items[j].used){ childIndent=items[j].indent; break; }
      }
      let childHtml = (childIndent!==null) ? build(childIndent) : '';
      out+='<li>'+inline(n.text)+childHtml+'</li>';
    }
    if(open) out+='</'+(ordered?'ol':'ul')+'>';
    return out;
  }
  return build(baseIndent);
}
