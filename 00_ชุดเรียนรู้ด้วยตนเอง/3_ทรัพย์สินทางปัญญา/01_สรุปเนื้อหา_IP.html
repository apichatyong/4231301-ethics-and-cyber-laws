<script>
const MD = "# 📘 สรุปเนื้อหา: ทรัพย์สินทางปัญญา (IP) \u0026 การจดสิทธิบัตร/ลิขสิทธิ์ซอฟต์แวร์\n### คาบ 5 | อ.กชพร สุสันหกนก (Diamondlaw) | ทดสอบย่อย 5 คะแนน\n\n\u003e IP เป็น **\"ทรัพย์สินที่จับต้องไม่ได้\"** มี 7 ประเภท: ลิขสิทธิ์ · สิทธิบัตร · เครื่องหมายการค้า · ความลับทางการค้า · สิ่งบ่งชี้ทางภูมิศาสตร์ · แบบผังภูมิวงจรรวม · พันธุ์พืชใหม่\n\u003e วิชานี้เน้น 4 ตัวหลัก + ซอฟต์แวร์\n\n---\n\n## 0. ตารางสรุปเปรียบเทียบ (จำตารางนี้ได้ = ได้ครึ่งหนึ่งแล้ว)\n\n| ประเภท | กฎหมาย | ได้สิทธิเมื่อ | อายุคุ้มครอง | อนุสัญญา |\n|---|---|---|---|---|\n| **ลิขสิทธิ์** | พ.ร.บ.ลิขสิทธิ์ **2537** | สร้างสรรค์ทันที (ไม่ต้องจด) | ตลอดชีพ + **50 ปี** | Berne |\n| **เครื่องหมายการค้า** | พ.ร.บ.เครื่องหมายการค้า **2534** | **จดทะเบียน** ต่อกรมทรัพย์สินฯ | **10 ปี** ต่ออายุได้เรื่อย ๆ | Paris |\n| **สิทธิบัตรการประดิษฐ์** | พ.ร.บ.สิทธิบัตร **2522** | จดทะเบียน | **20 ปี** (ต่อไม่ได้) | Paris |\n| **สิทธิบัตรการออกแบบผลิตภัณฑ์** | พ.ร.บ.สิทธิบัตร 2522 | จดทะเบียน | **10 ปี** | Paris |\n| **อนุสิทธิบัตร** (Petty Patent) | พ.ร.บ.สิทธิบัตร 2522 | จดทะเบียน | 6 ปี ต่อได้ 2 ครั้ง×2 ปี = สูงสุด **10 ปี** | — |\n| **ความลับทางการค้า** | พ.ร.บ.ความลับทางการค้า **2545** | เป็นความลับ + มีมาตรการรักษา (ไม่ต้องจด) | ตราบที่ยังเป็นความลับ | TRIPS |\n\n---\n\n## 1. ลิขสิทธิ์ (Copyright)\n\n- **เกิดทันทีที่สร้างสรรค์** — ไม่ต้องจดทะเบียน\n- **หลัก Originality** — ต้องริเริ่มสร้างสรรค์เอง\n- **Idea–Expression Dichotomy** — คุ้มครอง \"การแสดงออกที่มีรูปร่าง\" ไม่คุ้มครอง \"ความคิด/หลักการ/ทฤษฎี/กรรมวิธี\"\n- **8 ประเภทงานอันมีลิขสิทธิ์ (มาตรา 6):** วรรณกรรม · นาฏกรรม · ศิลปกรรม · ดนตรีกรรม · โสตทัศนวัสดุ · ภาพยนตร์ · สิ่งบันทึกเสียง · งานแพร่เสียงแพร่ภาพ\n- ⭐ **\"โปรแกรมคอมพิวเตอร์ (ซอฟต์แวร์) = งานวรรณกรรม\"** (ออกสอบแน่)\n- **อายุ:** ตลอดชีพผู้สร้างสรรค์ + 50 ปี; *ยกเว้น* งานศิลปประยุกต์ = **25 ปี** นับแต่สร้างสรรค์; โสตทัศน์/ภาพยนตร์/สิ่งบันทึกเสียง/แพร่ภาพ = 50 ปีนับแต่สร้างสรรค์\n\n**ความเป็นเจ้าของตามสัญญา:**\n- **สัญญาจ้างแรงงาน** → **ลูกจ้าง** เป็นเจ้าของลิขสิทธิ์ (นายจ้างมีสิทธิเผยแพร่ตามวัตถุประสงค์การจ้าง) เว้นแต่ระบุในสัญญาให้นายจ้างเป็นเจ้าของ\n- **สัญญาจ้างทำของ** → **ผู้ว่าจ้าง** เป็นเจ้าของ เว้นแต่ตกลงเป็นอย่างอื่น\n\n**งานที่ไม่ถือว่ามีลิขสิทธิ์:** กฎหมาย · ประกาศ/คำสั่งราชการ · คำพิพากษา · ข่าวประจำวัน/ข้อเท็จจริง · คำแปลของหน่วยงานรัฐ · หลักการ/ทฤษฎีวิทยาศาสตร์-คณิตศาสตร์\n\n**ข้อยกเว้นการละเมิด (Fair Use) 8 ข้อ:** วิจัย/ศึกษา(ไม่หากำไร) · ใช้ส่วนตน/ครอบครัว · ติชมวิจารณ์ · รายงานข่าว · ใช้ในกระบวนการศาล · ใช้สอน(ไม่หากำไร) · ทำสรุปแจกผู้เรียน(ไม่หากำไร) · ใช้เป็นข้อสอบ\n\u003e เงื่อนไขร่วม: ต้องไม่ขัดต่อการแสวงประโยชน์ตามปกติ + ไม่กระทบสิทธิเจ้าของเกินสมควร\n\n---\n\n## 2. เครื่องหมายการค้า (Trademark)\n\n- **ต้องจดทะเบียน** ต่อกรมทรัพย์สินทางปัญญาจึงได้รับความคุ้มครอง\n- **4 ประเภท:** เครื่องหมายการค้า · เครื่องหมายบริการ · เครื่องหมายรับรอง · เครื่องหมายร่วม\n- **เงื่อนไขรับจดทะเบียน 3 ข้อ:** (1) มี **ลักษณะบ่งเฉพาะ** (distinctiveness) (2) ไม่มีลักษณะ **ต้องห้าม** (3) ไม่เหมือน/คล้ายของผู้อื่นที่จดไว้แล้ว\n- **ลักษณะต้องห้าม** เช่น ตราแผ่นดิน/ธงชาติ/พระปรมาภิไธย/ตรากาชาด/ขัดศีลธรรม/เหมือนเครื่องหมายดังที่แพร่หลาย\n- **45 จำพวก:** จำพวก 1–34 = สินค้า, 35–45 = บริการ; คุ้มครองเฉพาะจำพวกที่จด (เว้นแต่ Well-Known Mark คุ้มครองกว้างกว่า)\n- **อายุ 10 ปี ต่ออายุได้ไม่จำกัด**; คุ้มครองเฉพาะในไทย (ขยายต่างประเทศผ่านระบบ Madrid)\n- จดได้: คำ · ภาพประดิษฐ์ · กลุ่มสี · **เสียง**\n\n**การละเมิด:**\n- **ปลอม (Counterfeit)** เครื่องหมายที่จดแล้ว → จำคุก ≤ **4 ปี** หรือปรับ ≤ **400,000 บาท**\n- **เลียน (Imitate)** ให้หลงเชื่อ → จำคุก ≤ **2 ปี** หรือปรับ ≤ **200,000 บาท**\n- **การลวงขาย (Passing Off)** — คุ้มครองเครื่องหมาย **ที่ไม่ได้จด** ได้ตาม ป.อาญา/ป.พ.พ. (ฟ้องเรียกค่าเสียหายจากการลวงขายได้)\n\n---\n\n## 3. สิทธิบัตร (Patent)\n\nหนังสือสำคัญที่รัฐออกให้คุ้มครอง **การประดิษฐ์ (Invention)** หรือ **การออกแบบผลิตภัณฑ์ (Design)** — 3 ประเภท:\n\n| ประเภท | เงื่อนไข | อายุ |\n|---|---|---|\n| สิทธิบัตรการประดิษฐ์ | ใหม่ (Novelty) + มีขั้นการประดิษฐ์สูงขึ้น (Inventive Step) + ใช้ในอุตสาหกรรมได้ (Industrial Application) | 20 ปี |\n| สิทธิบัตรการออกแบบผลิตภัณฑ์ | เป็นการออกแบบใหม่เพื่ออุตสาหกรรม/หัตถกรรม | 10 ปี |\n| อนุสิทธิบัตร (Petty Patent) | ใหม่ + ใช้ในอุตสาหกรรมได้ (ระดับพัฒนาไม่สูงมาก) | 6 ปี ต่อ 2 ครั้ง×2 ปี = 10 ปี |\n\n- **เจ้าของ = ผู้ทรงสิทธิบัตร**; ปกติผู้ประดิษฐ์เป็นเจ้าของ; ถ้าประดิษฐ์ในสัญญาจ้างแรงงาน → **นายจ้าง** มีสิทธิขอ (ลูกจ้างได้บำเหน็จพิเศษ)\n- **โทษละเมิดสิทธิบัตรการประดิษฐ์:** จำคุก ≤ 2 ปี หรือปรับ ≤ 400,000 บาท; อนุสิทธิบัตร ≤ 1 ปี/200,000; ยื่นขอโดยทุจริต ≤ 6 เดือน/5,000\n- **ข้อยกเว้นละเมิด:** ศึกษา/วิจัย/ทดลอง · ใช้โดยสุจริตก่อนยื่นขอ · เตรียมยาตามใบสั่งแพทย์ · ขึ้นทะเบียนยาหลังสิทธิบัตรหมดอายุ ฯลฯ\n\n---\n\n## 4. ความลับทางการค้า (Trade Secret)\n\n- **นิยาม:** ข้อมูลการค้าที่ (1) ยังไม่รู้จักกันทั่วไป (2) มีประโยชน์เชิงพาณิชย์เพราะเป็นความลับ (3) เจ้าของได้ใช้ **มาตรการที่เหมาะสม** เพื่อรักษาเป็นความลับ\n- **ตัวอย่าง:** สูตรผลิตภัณฑ์ (เช่น สูตร Coca-Cola), รายชื่อลูกค้า, ข้อมูลวิเคราะห์\n- **ไม่ต้องจดทะเบียน** คุ้มครองตราบที่ยังเป็นความลับ\n\n---\n\n## 5. 🎯 มิติจริยธรรม IP (สำหรับอัตนัย)\n\n- IP = **สมดุลระหว่าง \"รางวัลแก่ผู้สร้างสรรค์\" กับ \"ประโยชน์สาธารณะ\"** — ให้สิทธิผูกขาดชั่วคราวเพื่อจูงใจการสร้างสรรค์ แต่จำกัดเวลาเพื่อให้ความรู้ตกเป็นของสังคมในที่สุด\n- จริยธรรม = **เคารพแรงงานทางปัญญาของผู้อื่น** (เหมือนเคารพทรัพย์สิน) ไม่ลอก/ละเมิด/ลวงขาย\n- ซอฟต์แวร์: การละเมิดลิขสิทธิ์โปรแกรม = ขโมยผลงานสร้างสรรค์ แม้ \"ก๊อปปี้\" จะทำได้ง่าย\n";
const C0 = String.fromCharCode(1), C1 = String.fromCharCode(2);  // ตัวคั่นชั่วคราวสำหรับ inline code

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// จัดรูปแบบ inline: code, ลิงก์, ตัวหนา, ตัวเอียง  (rawHtml=true จะไม่ escape < >)
function inline(t, rawHtml){
  let s = rawHtml ? t : esc(t);
  const codes = [];
  s = s.replace(/`([^`]+)`/g, function(m,c){ codes.push(c); return C0+(codes.length-1)+C1; });
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(new RegExp(C0+'(\\d+)'+C1,'g'), function(m,i){ return '<code>'+codes[i]+'</code>'; });
  return s;
}

function isTableSep(l){ return /^\s*\|?[\s:|-]+\|?\s*$/.test(l) && l.indexOf('-')>=0; }
function splitRow(l){
  let s = l.trim().replace(/^\|/,'').replace(/\|$/,'');
  return s.split('|').map(function(c){ return c.trim(); });
}

function render(md){
  const lines = md.replace(/\r\n?/g,'\n').split('\n');
  let html = '', i = 0, para = [];
  const flush = function(){ if(para.length){ html += '<p>'+para.map(function(x){return inline(x);}).join('<br>')+'</p>'; para=[]; } };

  while(i < lines.length){
    let l = lines[i];

    if(l.trim()===''){ flush(); i++; continue; }

    // โค้ดบล็อก
    if(/^`/.test(l.trim())){ flush(); let buf=[]; i++;
      while(i<lines.length && !/^`/.test(lines[i].trim())){ buf.push(lines[i]); i++; }
      i++; html += '<pre><code>'+esc(buf.join('\n'))+'</code></pre>'; continue; }

    // หัวข้อ
    let h = l.match(/^(#{1,6})\s+(.*)$/);
    if(h){ flush(); const n=h[1].length; html += '<h'+n+'>'+inline(h[2])+'</h'+n+'>'; i++; continue; }

    // เส้นคั่น (--- หรือ *** หรือ ___) บรรทัดที่มีแต่อักขระเหล่านี้
    if(/^\s*([-*_])(\s*\1){2,}\s*$/.test(l)){ flush(); html+='<hr>'; i++; continue; }

    // ตาราง
    if(l.trim().indexOf('|')===0 && i+1<lines.length && isTableSep(lines[i+1])){
      flush();
      const head = splitRow(l); i += 2;
      let rows = [];
      while(i<lines.length && lines[i].trim().indexOf('|')===0){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+head.map(function(c){return '<th>'+inline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'+r.map(function(c){return '<td>'+inline(c)+'</td>';}).join('')+'</tr>'; }
      html += t+'</tbody></table>'; continue;
    }

    // blockquote
    if(/^\s*>/.test(l)){ flush(); let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      html += '<blockquote>'+buf.map(function(x){return x.trim()===''?'':'<p>'+inline(x)+'</p>';}).join('')+'</blockquote>'; continue; }

    // รายการ (รองรับย่อยตามการเยื้อง)
    if(/^\s*([-*+]|\d+\.)\s+/.test(l)){ flush();
      const block=[];
      while(i<lines.length && (/^\s*([-*+]|\d+\.)\s+/.test(lines[i]) || (lines[i].trim()!=='' && /^\s{2,}\S/.test(lines[i]) && block.length))){
        block.push(lines[i]); i++;
      }
      html += renderList(block); continue;
    }

    // HTML ดิบ (เช่น <details>)
    if(/^\s*</.test(l)){ flush(); html += inline(l, true); i++; continue; }

    para.push(l); i++;
  }
  flush();
  return html;
}

// แปลงรายการที่มีการเยื้องเป็น <ul>/<ol> ซ้อนได้
function renderList(block){
  const items = [];
  for(const raw of block){
    const m = raw.match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
    if(m){
      items.push({ indent:m[1].length, ordered:/\d+\./.test(m[2]), text:m[3], used:false });
    } else if(items.length){
      items[items.length-1].text += '<br>'+inline(raw.trim());
    }
  }
  if(!items.length) return '';
  const baseIndent = Math.min.apply(null, items.map(function(n){return n.indent;}));
  function build(parentIndent){
    let out='', ordered=null, open=false;
    for(let k=0;k<items.length;k++){
      const n=items[k];
      if(n.used) continue;
      if(n.indent!==parentIndent) continue;
      n.used=true;
      if(!open){ ordered=n.ordered; out+='<'+(ordered?'ol':'ul')+'>'; open=true; }
      // หาลูก (ระดับเยื้องมากกว่า) ที่อยู่ถัดไปก่อนจะกลับมาระดับเดิม
      let childIndent=null;
      for(let j=k+1;j<items.length;j++){
        if(items[j].indent<=parentIndent) break;
        if(!items[j].used){ childIndent=items[j].indent; break; }
      }
      let childHtml = (childIndent!==null) ? build(childIndent) : '';
      out+='<li>'+inline(n.text)+childHtml+'</li>';
    }
    if(open) out+='</'+(ordered?'ol':'ul')+'>';
    return out;
  }
  return build(baseIndent);
}

document.getElementById('content').innerHTML = render(MD);
</script>
